<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NERVA v11 · Mixed-State Decision Integrity Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,200;0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&display=swap" />
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; background: #0a0e15; font-family: 'IBM Plex Sans', system-ui, sans-serif; overflow: hidden; color: #e8e3d8; }

  /* Slider track */
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    background: transparent; cursor: pointer; outline: none;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px;
    background: linear-gradient(180deg, rgba(232,227,216,0.04), rgba(232,227,216,0.14));
    border: 1px solid rgba(232,227,216,0.06);
    border-radius: 1px;
  }
  input[type=range]::-moz-range-track {
    height: 4px;
    background: rgba(232,227,216,0.10);
    border: 1px solid rgba(232,227,216,0.06);
    border-radius: 1px;
  }

  /* Slider thumb — precision-instrument style */
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: #11161f;
    border: 2px solid currentColor;
    border-radius: 50%;
    margin-top: -7px;
    cursor: grab;
    box-shadow:
      0 0 0 1px rgba(10,14,21,0.9),
      0 0 6px rgba(0,0,0,0.6),
      inset 0 0 0 2px #11161f;
    transition: transform 80ms ease, box-shadow 80ms ease;
  }
  input[type=range]::-webkit-slider-thumb:hover,
  input[type=range]::-webkit-slider-thumb:active {
    transform: scale(1.12);
    box-shadow:
      0 0 0 1px rgba(10,14,21,0.9),
      0 0 10px currentColor,
      inset 0 0 0 2px #11161f;
    cursor: grabbing;
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    background: #11161f;
    border: 2px solid currentColor;
    border-radius: 50%;
    cursor: grab;
    box-shadow:
      0 0 0 1px rgba(10,14,21,0.9),
      0 0 6px rgba(0,0,0,0.6);
    transition: transform 80ms ease, box-shadow 80ms ease;
  }
  input[type=range]::-moz-range-thumb:hover,
  input[type=range]::-moz-range-thumb:active {
    transform: scale(1.12);
    box-shadow: 0 0 0 1px rgba(10,14,21,0.9), 0 0 10px currentColor;
    cursor: grabbing;
  }
  input[type=range]:focus { outline: none; }

  /* Smaller, more delicate thumb for data-quality sub-sliders */
  input[type=range].nerva-conf-slider::-webkit-slider-runnable-track { height: 2px; }
  input[type=range].nerva-conf-slider::-moz-range-track { height: 2px; }
  input[type=range].nerva-conf-slider::-webkit-slider-thumb {
    width: 11px; height: 11px;
    border-width: 1.5px;
    margin-top: -5px;
    box-shadow: 0 0 0 1px rgba(10,14,21,0.9), 0 0 3px rgba(0,0,0,0.5);
  }
  input[type=range].nerva-conf-slider::-moz-range-thumb {
    width: 11px; height: 11px;
    border-width: 1.5px;
  }

  textarea, input { font-family: inherit; }
  textarea::-webkit-scrollbar, *::-webkit-scrollbar { width: 4px; height: 4px; }
  textarea::-webkit-scrollbar-thumb, *::-webkit-scrollbar-thumb { background: rgba(232,227,216,0.18); }
  button { font-family: inherit; }
  ::selection { background: #f5b942; color: #0a0e15; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="nerva-v11-core.jsx"></script>
<script type="text/babel" src="variation-v11.jsx"></script>

<script type="text/babel" data-presets="env,react">
  function Root() {
    return (
      <NervaV11Provider>
        <NervaV11Cockpit />
      </NervaV11Provider>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
