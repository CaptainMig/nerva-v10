// ── NERVA BLOCH SPHERE KERNEL v8.3.2 ─────────────────────
const clamp = (v, lo=0, hi=1) => Math.max(lo, Math.min(hi, v));
const fmt = (n, d=2) => (n==null||isNaN(n)) ? '—' : Number(n).toFixed(d);

function vonNeumannEntropy(r) {
  if (r >= 0.9999) return 0;
  if (r <= 0.0001) return 1;
  const lp = (1+r)/2, lm = (1-r)/2;
  return -lp*Math.log2(lp) - lm*Math.log2(lm);
}

function computeMetrics(state) {
  const {E, S, R, Sp, St, tauMode, tauManual} = state;
  const r_max = Math.sqrt(3);
  const r_x = (E+S)/2/r_max, r_y = R/r_max, r_z = (Sp*St)/r_max;
  const r = Math.sqrt(r_x*r_x + r_y*r_y + r_z*r_z);
  const theta = r > 0 ? Math.acos(clamp(r_z/r,-1,1))*(180/Math.PI) : 0;
  const phi = Math.atan2(r_y, r_x)*(180/Math.PI);
  const entropy = vonNeumannEntropy(r);
  const purity = 0.5*(1 + r*r);
  const coherence = Math.sqrt(r_x*r_x + r_y*r_y);
  const integrity = Sp*St;
  const reversibility = clamp((Sp+St)/2);
  const EV = Sp - R;
  const tauAuto = clamp(0.25 + 0.35*entropy + 0.25*R - 0.15*reversibility, 0.15, 0.85);
  const tau = tauMode === 'manual' ? clamp(tauManual, 0.15, 0.85) : tauAuto;
  const signal = r >= tau;
  const oneWayDoor = reversibility < 0.4;
  const validation = {
    bloch_magnitude_valid: r <= 1.0001,
    purity_range_valid: purity >= 0.4999 && purity <= 1.0001,
    entropy_range_valid: entropy >= 0 && entropy <= 1.0001,
    components_consistent: Math.abs(r - Math.sqrt(r_x*r_x+r_y*r_y+r_z*r_z)) < 0.0001
  };
  let verdict, reason;
  if (!signal) {
    if (E >= 0.75 && oneWayDoor) { verdict='ESCALATE'; reason='[EMERGENCY OVERRIDE] High urgency + irreversible. Cannot wait.'; }
    else { verdict='WAIT'; reason=`Insufficient signal. |r|=${fmt(r,3)} < τ=${fmt(tau,3)}.`; }
  } else if (integrity < 0.22 || (R > 0.75 && integrity < 0.35)) {
    verdict='TOXIC'; reason=`Hard veto. Integrity=${fmt(integrity,2)}, Risk=${fmt(R,2)}.`;
  } else if (oneWayDoor && integrity < 0.55) {
    verdict='ESCALATE'; reason=`One-Way Brake. Irreversible (rev=${fmt(reversibility,2)}) with weak foundation (I=${fmt(integrity,2)}).`;
  } else if (EV < 0) {
    verdict = integrity >= 0.4 ? 'HOLD' : 'ESCALATE';
    reason = `EV Block. Negative expected value (EV=${fmt(EV,2)}).`;
  } else if (integrity >= 0.6 && EV > 0.1) {
    verdict='COMMIT'; reason=`Strong foundation (I=${fmt(integrity,2)}), positive EV (${fmt(EV,2)}). Proceed.`;
  } else if (integrity >= 0.4) {
    verdict='HOLD'; reason=`Medium foundation (I=${fmt(integrity,2)}). EV=${fmt(EV,2)}. Recheck.`;
  } else {
    verdict='ESCALATE'; reason=`Signal cleared but integrity (${fmt(integrity,2)}) below floor.`;
  }
  return { r, r_x, r_y, r_z, theta, phi, entropy, purity, coherence, integrity, reversibility, EV, tau, tauAuto, signal, oneWayDoor, verdict, reason, validation };
}

// ── SEED HISTORY ──────────────────────────────────────────
function seedHistory() {
  const seeds = [
    {E:0.32,S:0.71,R:0.22,Sp:0.78,St:0.84,label:'DRN-04412'},
    {E:0.81,S:0.92,R:0.39,Sp:0.78,St:0.61,label:'HFT-09921'},

    {E:0.59,S:0.98,R:0.42,Sp:0.51,St:0.52,label:'ADV-30022'},
  ];
  const base = Date.now();
  return seeds.map((s,i) => {
    const m = computeMetrics({...s, tauMode:'auto', tauManual:0.25});
    return {...s, ...m, t: base - (5-i)*240000};
  });
}

// ── FORECAST ──────────────────────────────────────────────
function computeForecast(history, metrics, state) {
  const hz = [{label:'T+1m',minutes:1},{label:'T+5m',minutes:5},{label:'T+15m',minutes:15},{label:'T+1h',minutes:60}];
  const all = [...history.map(h=>({t:h.t,r:h.r})), {t:Date.now(),r:metrics.r}];
  const t0 = all[0].t;
  const xs = all.map(p=>(p.t-t0)/60000), ys = all.map(p=>p.r);
  const n = xs.length, mX = xs.reduce((a,b)=>a+b,0)/n, mY = ys.reduce((a,b)=>a+b,0)/n;
  let num=0, den=0;
  xs.forEach((x,i) => { num+=(x-mX)*(ys[i]-mY); den+=(x-mX)**2; });
  const slope = den===0 ? 0 : num/den, HL=25;
  const points = hz.map(h => {
    const damp = Math.exp(-h.minutes/HL), r = clamp(metrics.r + slope*h.minutes*damp);
    const sigma = clamp(0.035 + 0.022*Math.sqrt(h.minutes) + 0.12*metrics.entropy*Math.sqrt(h.minutes/30), 0, 0.5);
    const z = (metrics.tau-r)/Math.max(0.01,sigma);
    const cdf = 0.5*(1+Math.sign(-z)*Math.sqrt(1-Math.exp(-2*z*z/Math.PI)));
    return {...h, r, sigma, lo:clamp(r-sigma), hi:clamp(r+sigma), pAbove:clamp(1-cdf)};
  });
  let window;
  if (Math.abs(slope) < 0.002) window = metrics.r>=metrics.tau ? 'ACT NOW — signal stable above τ' : 'HOLD — signal stable below τ';
  else if (slope > 0) {
    if (metrics.r >= metrics.tau) window = 'ACT NOW — signal strengthening';
    else { const need=(metrics.tau-metrics.r)/slope; window=need>60?'WAIT — unlikely to clear τ within 1h':`WAIT — likely to clear τ in ~${Math.max(1,Math.round(need))}m`; }
  } else {
    if (metrics.r >= metrics.tau) { const fade=(metrics.r-metrics.tau)/Math.abs(slope); window=fade>60?'ACT THIS HOUR — stable for now':`ACT WITHIN ~${Math.max(1,Math.round(fade))}m — signal decaying`; }
    else window = 'HOLD — signal decaying below τ';
  }
  return { slope, points, window };
}

// ── NERVA CONTEXT ─────────────────────────────────────────
const NervaCtx = createContext(null);

function NervaProvider({children}) {
  const [state, setState] = useState({
    E:0.59, S:0.98, R:0.42, Sp:0.51, St:0.52,
    tauMode:'auto', tauManual:0.25,
    scenario:'Agency partner has automated the ad-buy validity step.', activePreset:'ad'
  });
  const [history] = useState(seedHistory);
  const [api, setApi] = useState({latency:84, region:'us-west-2', model:'nerva-bloch-v10', status:'nominal', uptime:99.982});
  useEffect(() => {
    const id = setInterval(() => setApi(a => ({...a, latency: clamp(a.latency+(Math.random()-0.5)*14, 55, 190)})), 2400);
    return () => clearInterval(id);
  }, []);
  const metrics = useMemo(() => computeMetrics(state), [state]);
  const forecast = useMemo(() => computeForecast(history, metrics, state), [history, metrics, state]);
  const update = useCallback(patch => setState(s => ({...s, ...patch})), []);
  const value = {state, update, metrics, forecast, history, api};
  return <NervaCtx.Provider value={value}>{children}</NervaCtx.Provider>;
}

function useNerva() { return useContext(NervaCtx); }

function plumbToNerva(scores, flightPressure=0.5) {
  const m = arr => arr.reduce((a,b)=>a+b,0)/arr.length/100;
  const opt = m([scores.cpm,scores.reach,scores.freq,scores.targ,scores.attr]);
  const auth = m([scores.ctx,scores.dig,scores.cult,scores.earn,scores.mom]);
  const pricing_stability = m([scores.budg,scores.scale,scores.pay]);
  const pricing_risk = (200 - scores.cpk - scores.rev) / 200;
  return {
    E: flightPressure, S: auth, R: 1-pricing_risk, Sp: opt, St: pricing_stability,
    composites: { opt:opt*100, auth:auth*100, pricing:((pricing_stability*100*3)+scores.cpk+scores.rev)/5 },
  };
}

function PlumbForecastChart({history, current, forecast}) {
  const W=280, H=88, M={l:6,r:6,t:10,b:14};
  const pw=W-M.l-M.r, ph=H-M.t-M.b;
  const nowX=0.4;
  const histPts = history.map((h,i) => ({x:(i/Math.max(1,history.length))*nowX, r:h.r}));
  const fcPts = [{x:nowX,r:current.r,sigma:0}];
  forecast.points.forEach(p => fcPts.push({x:nowX+(p.minutes/60)*(1-nowX),r:p.r,sigma:p.sigma}));
  const xp = v => M.l+v*pw, yp = v => M.t+(1-v)*ph;
  const tauY = yp(current.tau);
  const bandTop = fcPts.map(p=>`${xp(p.x)},${yp(Math.min(1,p.r+p.sigma))}`).join(' ');
  const bandBot = fcPts.map(p=>`${xp(p.x)},${yp(Math.max(0,p.r-p.sigma))}`).reverse().join(' ');
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:H,display:'block'}}>
      <line x1={M.l} y1={tauY} x2={M.l+pw} y2={tauY} stroke={px.ink} strokeDasharray="3 3" opacity="0.4"/>
      <text x={M.l+pw-2} y={tauY-3} textAnchor="end" style={{font:`9.5px ${px.mono}`,fill:px.inkDim}}>τ {fmt(current.tau,2)}</text>
      <line x1={xp(nowX)} y1={M.t} x2={xp(nowX)} y2={M.t+ph} stroke={px.ink} strokeDasharray="1 2" opacity="0.35"/>
      <text x={xp(nowX)} y={M.t-2} textAnchor="middle" style={{font:`9.5px ${px.mono}`,fill:px.ink}}>NOW</text>
      <polygon points={`${bandTop} ${bandBot}`} fill={px.ink} opacity="0.10"/>
      <polyline points={histPts.map(p=>`${xp(p.x)},${yp(p.r)}`).join(' ')} fill="none" stroke={px.ink} strokeWidth="1.4" opacity="0.7"/>
      {histPts.map((p,i) => <circle key={i} cx={xp(p.x)} cy={yp(p.r)} r="1.6" fill={px.ink} opacity="0.6"/>)}
      <polyline points={fcPts.map(p=>`${xp(p.x)},${yp(p.r)}`).join(' ')} fill="none" stroke={px.ink} strokeWidth="1.6" strokeDasharray="3 2"/>
      <circle cx={xp(nowX)} cy={yp(current.r)} r="3" fill={px.ink}/>
      {forecast.points.map((p,i) => {
        const x = xp(nowX+(p.minutes/60)*(1-nowX));
        return <g key={i}><line x1={x} y1={M.t+ph} x2={x} y2={M.t+ph+2} stroke={px.inkDim}/><text x={x} y={M.t+ph+11} textAnchor="middle" style={{font:`9.5px ${px.mono}`,fill:px.inkDim}}>{p.label.replace('T+','')}</text></g>;
      })}
    </svg>
  );
}

  const [scores, setScores] = useState(PLUMB_DEFAULTS);
  const [humanState, setHumanState] = useState({cult:'reviewed', mom:'reviewed'});
  const [brief, setBrief] = useState(PLUMB_BRIEFS[0]);
  const [flightPressure, setFlightPressure] = useState(0.5);
  const [oneWayDoor, setOneWayDoor] = useState('First measurable recall signal at week 2');

  const mapped = useMemo(() => plumbToNerva(scores, flightPressure), [scores, flightPressure]);
  useEffect(() => {
    update({E:mapped.E, S:mapped.S, R:mapped.R, Sp:mapped.Sp, St:mapped.St});
  }, [mapped.E, mapped.S, mapped.R, mapped.Sp, mapped.St]);

  const composites = mapped.composites;
  const overall = Math.round((composites.opt + composites.auth + composites.pricing) / 3);
  const verdict = metrics.verdict;
  const humanGate = (humanState.cult==='pending' && scores.cult<70) || (humanState.mom==='pending' && scores.mom<70);
  const finalVerdict = humanGate && verdict==='COMMIT' ? 'ESCALATE' : verdict;
  const v = PLUMB_VERDICT[finalVerdict];
  const pricingSub = PRICING_SUB(composites.pricing);
  const isToxicShape = composites.opt >= 65 && composites.auth < 50;

  const applyBrief = b => { setBrief(b); setScores(b.values); setHumanState({cult:b.cult, mom:b.mom}); };
  const setScore = (id, val) => setScores(s => ({...s, [id]:val}));

  return (
    <div style={{width:'100%',minHeight:'100vh',background:px.bg,color:px.ink,fontFamily:px.sans,display:'flex',flexDirection:'column'}}>
      {/* HEADER */}
      <header style={{padding:'14px 28px 12px',display:'grid',gridTemplateColumns:'1fr auto 1fr',alignItems:'end',gap:18,borderBottom:`1px solid ${px.ink}`,background:px.paper}}>
        <div>
          <div style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.22em'}}>AC ADS · PLUMB · v3 · 2026</div>
          <h1 style={{margin:'4px 0 0',font:`500 38px/0.95 ${px.serif}`,color:px.ink,letterSpacing:'-0.02em'}}>Plumb.</h1>
          <div style={{font:`italic 14px/1.3 ${px.serif}`,color:px.inkDim,marginTop:2}}>The three-layer buyside audit.</div>
        </div>
        <div style={{textAlign:'center',borderLeft:`1px solid ${px.rule}`,borderRight:`1px solid ${px.rule}`,padding:'0 22px'}}>
          <div style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.18em'}}>SCORING ENGINE</div>
          <div style={{font:`500 16px/1 ${px.serif}`,marginTop:4}}>running on <span style={{font:`600 14px ${px.mono}`,letterSpacing:'0.18em',color:px.ink}}>NERVA v10</span></div>
          <div style={{font:`italic 11.5px/1.3 ${px.serif}`,color:px.inkDim,marginTop:4}}>decision integrity engine · {api.region} · {Math.round(api.latency)}ms</div>
        </div>
        <div style={{textAlign:'right',font:`11px/1.45 ${px.mono}`,color:px.inkDim}}>
          <div style={{color:px.ink,font:`500 12px ${px.mono}`,letterSpacing:'0.08em'}}>AUDIT 28491 · LIVE</div>
          <div>session 7F-2A91</div>
          <div style={{color:px.green,marginTop:1}}>● api nominal {api.uptime}%</div>
          <a href="/" style={{color:px.inkFaint,font:`9px ${px.mono}`,letterSpacing:'0.14em',textDecoration:'none',marginTop:4,display:'block'}}>← NERVA v10</a>
        </div>
      </header>

      {/* BRIEF BAR */}
      <div style={{padding:'10px 28px',borderBottom:`1px solid ${px.rule}`,background:px.bg,display:'grid',gridTemplateColumns:'auto 1fr auto',gap:24,alignItems:'center'}}>
        <div>
          <div style={{font:`9.5px ${px.mono}`,color:px.inkDim,letterSpacing:'0.18em',marginBottom:2}}>BRIEF</div>
          <div style={{font:`500 15px/1.1 ${px.serif}`,color:px.ink}}>{brief.brand} <span style={{color:px.inkDim}}>·</span> {brief.title}</div>
          <div style={{font:`italic 12px ${px.serif}`,color:px.inkDim}}>{brief.category} · {brief.channel} · ${(brief.budget/1000).toFixed(0)}K · {brief.flight}</div>
        </div>
        <div style={{font:`12px/1.4 ${px.serif}`,color:px.inkDim,paddingLeft:16,borderLeft:`1px solid ${px.rule}`}}>
          <span style={{color:px.ink}}>Measured against ·</span> {brief.target}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'flex-end'}}>
          {PLUMB_BRIEFS.map(b => (
            <button key={b.id} onClick={() => applyBrief(b)} style={{background:brief.id===b.id?px.ink:'transparent',color:brief.id===b.id?px.paper:px.ink,border:`1px solid ${px.ink}`,font:`600 10px/1 ${px.mono}`,letterSpacing:'0.06em',padding:'5px 8px',cursor:'pointer'}}>
              {b.title.split('—')[0].trim()||b.title}
            </button>
          ))}
        </div>
      </div>

      {/* MAIN GRID */}
      <div style={{flex:1,display:'grid',gridTemplateColumns:'1fr 1fr 1fr 380px',gap:12,padding:'14px 22px 0'}}>
        <LayerCard layer={PLUMB_LAYERS[0]} scores={scores} setScore={setScore} humanState={humanState} setHumanState={setHumanState} composite={composites.opt}/>
        <LayerCard layer={PLUMB_LAYERS[1]} scores={scores} setScore={setScore} humanState={humanState} setHumanState={setHumanState} composite={composites.auth}/>
        <LayerCard layer={PLUMB_LAYERS[2]} scores={scores} setScore={setScore} humanState={humanState} setHumanState={setHumanState} composite={composites.pricing}/>

        {/* VERDICT COLUMN */}
        <aside style={{display:'flex',flexDirection:'column',gap:12,minHeight:0}}>
          <div style={{background:px.paper,border:`2px solid ${v.color}`,padding:'14px 18px'}}>
            <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between'}}>
              <span style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.2em'}}>VERDICT</span>
              <span style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.12em'}}>composite {overall}</span>
            </div>
            <div style={{font:`500 56px/0.95 ${px.serif}`,color:v.color,letterSpacing:'-0.03em',marginTop:2}}>
              {v.label.charAt(0)+v.label.slice(1).toLowerCase()}
            </div>
            <div style={{display:'flex',alignItems:'baseline',gap:8,marginTop:4}}>
              <span style={{font:`italic 14px ${px.serif}`,color:v.color}}>{v.action}.</span>
              <span style={{font:`italic 13px ${px.serif}`,color:px.inkDim}}>pricing <span style={{color:pricingSub.tint}}>{pricingSub.label.toLowerCase()}</span></span>
            </div>
            <div style={{font:`13px/1.5 ${px.serif}`,color:px.ink,marginTop:10}}>
              {finalVerdict==='COMMIT' && 'All three layers earn the buy. Distribution math clears the floor, authenticity earns the moment, pricing is sound against the named outcomes.'}
              {finalVerdict==='HOLD' && 'One layer is soft but not disqualifying. Tighten the inputs and re-score before approving spend.'}
              {finalVerdict==='WAIT' && 'Pricing fails or both quality layers are below threshold. Not a media question yet — return to strategy or renegotiate the rate.'}
              {finalVerdict==='ESCALATE' && 'One layer requires judgment the model cannot supply. Escalate to named senior strategist; override reasoning logs to audit field.'}
              {finalVerdict==='TOXIC' && (isToxicShape
                ? 'High optimization, low authenticity. The buy scores well on metrics the agency charges against — and poorly on the layer they have no incentive to measure. The verdict no compensation model produces on its own.'
                : 'Hard veto. Reversibility too low against current foundation. Do not proceed.')}
            </div>
          </div>

          {/* Compound gate */}
          <div style={{background:px.paper,border:`1px solid ${px.ruleHi}`,padding:'12px 16px'}}>
            <div style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.2em',marginBottom:8}}>COMPOUND GATE</div>
            {[['Optimization',composites.opt,70],['Authenticity',composites.auth,70],['Pricing',composites.pricing,70]].map(([l,c,t]) => {
              const color = c>=70 ? px.green : c>=55 ? px.amber : px.accent;
              return (
                <div key={l} style={{display:'grid',gridTemplateColumns:'90px 1fr 38px',alignItems:'center',gap:8,marginBottom:6}}>
                  <span style={{font:`13px/1 ${px.serif}`,color:px.ink}}>{l}</span>
                  <div style={{position:'relative',height:8,background:'rgba(21,17,11,0.06)'}}>
                    <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${c}%`,background:color}}/>
                    <div style={{position:'absolute',left:`${t}%`,top:-3,bottom:-3,width:1.5,background:px.ink}}/>
                  </div>
                  <span style={{font:`12px/1 ${px.mono}`,color,textAlign:'right'}}>{Math.round(c)}</span>
                </div>
              );
            })}
            <div style={{font:`italic 11px/1.4 ${px.serif}`,color:px.inkDim,marginTop:6,paddingTop:6,borderTop:`1px solid ${px.rule}`}}>
              All three gates clear independently for COMMIT. A strong Optimization score does not override a failed Authenticity score.
            </div>
          </div>

          {/* Forecast */}
          <div style={{background:px.paper,border:`1px solid ${px.ruleHi}`,padding:'12px 16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
              <span style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.2em'}}>FORECAST AT FLIGHT CLOSE</span>
              <span style={{font:`9.5px ${px.mono}`,color:px.inkFaint,letterSpacing:'0.1em'}}>n={history.length+1}</span>
            </div>
            <PlumbForecastChart history={history} current={metrics} forecast={forecast}/>
            <div style={{marginTop:4,font:`11.5px/1.4 ${px.serif}`,color:px.inkDim}}>
              {forecast.window}. P(≥τ) at close: <strong style={{color:px.ink}}>{Math.round(forecast.points[forecast.points.length-1].pAbove*100)}%</strong>
            </div>
          </div>

          {finalVerdict==='COMMIT' && (
            <div style={{background:px.paper,border:`1px solid ${px.ruleHi}`,padding:'12px 16px'}}>
              <div style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.2em',marginBottom:6}}>ONE-WAY DOOR CRITERION</div>
              <input value={oneWayDoor} onChange={e=>setOneWayDoor(e.target.value)} style={{width:'100%',font:`13px/1.4 ${px.serif}`,padding:'4px 6px',background:'transparent',border:`1px solid ${px.rule}`,color:px.ink,outline:'none'}}/>
              <div style={{font:`italic 11px/1.4 ${px.serif}`,color:px.inkDim,marginTop:6}}>Stamps to the IO. Falsified at flight close against the named KPI target set.</div>
            </div>
          )}
          {finalVerdict==='ESCALATE' && (
            <div style={{background:px.paper,border:`1px solid ${px.ruleHi}`,padding:'12px 16px'}}>
              <div style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.2em',marginBottom:6}}>ESCALATION QUEUE</div>
              <div style={{font:`13px/1.5 ${px.serif}`,color:px.ink}}>Route to <strong>Senior strategist</strong> · channel SME.</div>
              <div style={{font:`italic 11px/1.4 ${px.serif}`,color:px.inkDim,marginTop:4}}>Documented escalations hit at 78%. Undocumented at 33%. Override reasoning stamps to audit field.</div>
              <button style={{marginTop:8,width:'100%',background:px.ink,color:px.paper,border:'none',font:`600 11px/1 ${px.mono}`,letterSpacing:'0.16em',padding:'8px 0',cursor:'pointer'}}>SEND TO REVIEW · SARAH K</button>
            </div>
          )}
        </aside>
      </div>

      {/* FOOTER */}
      <div style={{marginTop:14,padding:'12px 28px 16px',borderTop:`1px solid ${px.rule}`,display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:24,background:px.paper}}>
        <div>
          <div style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.2em',marginBottom:4}}>NERVA DERIVED INPUTS</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,font:`12px ${px.mono}`,color:px.ink}}>
            {[['E',mapped.E,'flight pressure'],['S',mapped.S,'authenticity'],['R',mapped.R,'price risk'],['Sp',mapped.Sp,'optimization'],['St',mapped.St,'pricing health']].map(([k,val,sub]) => (
              <div key={k}><div style={{color:px.accent}}>{k}</div><div>{fmt(val,2)}</div><div style={{font:`italic 10px ${px.serif}`,color:px.inkFaint}}>{sub}</div></div>
            ))}
          </div>
        </div>
        <div>
          <div style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.2em',marginBottom:4}}>FLIGHT PRESSURE · E</div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <input type="range" min="0" max="1" step="0.01" value={flightPressure} onChange={e=>setFlightPressure(parseFloat(e.target.value))} style={{flex:1,accentColor:px.accent}}/>
            <span style={{font:`14px ${px.mono}`,color:px.ink,width:40}}>{fmt(flightPressure,2)}</span>
          </div>
          <div style={{font:`italic 11px/1.4 ${px.serif}`,color:px.inkDim,marginTop:4}}>Time-to-IO pressure. Higher values raise NERVA's adaptive threshold τ.</div>
        </div>
        <div>
          <div style={{font:`10px ${px.mono}`,color:px.inkDim,letterSpacing:'0.2em',marginBottom:4}}>NERVA SIGNAL</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,font:`12px ${px.mono}`}}>
            {[['|r|',metrics.r,v.color],['τ',metrics.tau,null],['EV',metrics.EV,metrics.EV>0?px.green:px.accent],['ρ',metrics.reversibility,null]].map(([l,val,col]) => (
              <div key={l}><div style={{color:px.inkDim}}>{l}</div><div style={{font:`400 18px ${px.mono}`,color:col||px.ink}}>{fmt(val,3)}</div></div>
            ))}
          </div>
          <div style={{font:`italic 11px/1.4 ${px.serif}`,color:px.inkDim,marginTop:4}}>Plumb's verdict and NERVA's signal gate on the same evidence. The receipt is the same number, in two languages.</div>
        </div>
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(
  <NervaProvider><PlumbView/></NervaProvider>
);
</script>
</body>
</html>
