.nav-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#3ddc97;animation:pulse-dot 2s infinite}

textarea{resize:none;outline:none;border:none}
button{cursor:pointer;font-family:inherit}
::selection{background:#4cc9f0;color:#000}

<script type="text/babel" data-presets="env,react">
// ═══════════════════════════════════════════════════════════
// NERVA v10.0 — REAL BLOCH SPHERE KERNEL (v8.3.2 math)
// ═══════════════════════════════════════════════════════════

const {
  createContext, useContext, useState, useMemo,
  useCallback, useEffect, useRef, useReducer
} = React;

// ── MATH CORE (v8.3.2 rigor) ──────────────────────────────
const clamp = (v, lo=0, hi=1) => Math.max(lo, Math.min(hi, v));
const fmt = (n, d=2) => (n==null||isNaN(n)) ? '—' : Number(n).toFixed(d);

function vonNeumannEntropy(r) {
  if (r >= 0.9999) return 0;
  if (r <= 0.0001) return 1;
  const lp = (1+r)/2, lm = (1-r)/2;
  return -lp*Math.log2(lp) - lm*Math.log2(lm);
}

function computeMetrics(state) {
  const { E, S, R, Sp, St, tauMode, tauManual } = state;

  // v8.3.1 normalized Bloch components — ALL use same √3 denominator
  const r_max = Math.sqrt(3);
  const x_raw = (E + S) / 2;   // intent
  const y_raw = R;               // risk
  const z_raw = Sp * St;        // integrity foundation

  const r_x = x_raw / r_max;
  const r_y = y_raw / r_max;
  const r_z = z_raw / r_max;

  // Signal magnitude — computed FROM components (Grok fix: guaranteed consistent)
  const r = Math.sqrt(r_x*r_x + r_y*r_y + r_z*r_z);

  // Spherical coordinates
  const theta = r > 0 ? Math.acos(clamp(r_z/r,-1,1)) * (180/Math.PI) : 0;
  const phi   = Math.atan2(r_y, r_x) * (180/Math.PI);

  // Density matrix metrics (closed-form from eigenvalues)
  const entropy    = vonNeumannEntropy(r);
  const purity     = 0.5 * (1 + r*r);                    // Tr(ρ²) ∈ [0.5,1]
  const coherence  = Math.sqrt(r_x*r_x + r_y*r_y);       // ℓ₁-norm transverse
  const integrity  = z_raw;                                // = Sp × St
  const reversibility = clamp((Sp + St) / 2);
  const EV         = Sp - R;

  // Information-theoretic threshold (v8.3.2)
  const tauAuto = clamp(0.25 + 0.35*entropy + 0.25*R - 0.15*reversibility, 0.15, 0.85);
  const tau = tauMode === 'manual' ? clamp(tauManual, 0.15, 0.85) : tauAuto;

  // Validation (for API/pitch display)
  const validation = {
    bloch_magnitude_valid: r <= 1.0001,
    purity_range_valid: purity >= 0.4999 && purity <= 1.0001,
    entropy_range_valid: entropy >= 0 && entropy <= 1.0001,
    components_consistent: Math.abs(r - Math.sqrt(r_x*r_x+r_y*r_y+r_z*r_z)) < 0.0001
  };

  // Signal gate
  const signal = r >= tau;
  const oneWayDoor = reversibility < 0.4;

  // Decision logic (v8.3.2 with Emergency Override + One-Way Brake + EV Block)
  let verdict, reason;

  if (!signal) {
    // Emergency Override: high urgency + irreversible cannot sit in WAIT
    if (E >= 0.75 && oneWayDoor) {
      verdict = 'ESCALATE';
      reason = '[EMERGENCY OVERRIDE] High urgency + irreversible action. Cannot wait — routing to human immediately.';
    } else {
      verdict = 'WAIT';
      reason = `Insufficient signal. |r|=${fmt(r,3)} < τ=${fmt(tau,3)}. Gather more data before acting.`;
    }
  } else if (integrity < 0.22 || (R > 0.75 && integrity < 0.35)) {
    verdict = 'TOXIC';
    reason = `Hard veto. Low integrity (${fmt(integrity,2)}) with high risk (R=${fmt(R,2)}). Autonomous action prohibited.`;
  } else if (oneWayDoor && integrity < 0.55) {
    // One-Way Brake
    verdict = 'ESCALATE';
    reason = `One-Way Brake engaged. Irreversible action (rev=${fmt(reversibility,2)}) requires stronger foundation (I=${fmt(integrity,2)}).`;
  } else if (EV < 0) {
    // EV Block — suppress COMMIT when expected value is negative
    verdict = integrity >= 0.4 ? 'HOLD' : 'ESCALATE';
    reason = `EV Block. Negative expected value (EV=${fmt(EV,2)}) suppresses commit. ${verdict === 'HOLD' ? 'Recheck conditions.' : 'Route to human.'}`;
  } else if (integrity >= 0.6 && EV > 0.1) {
    verdict = 'COMMIT';
    reason = `Strong foundation (I=${fmt(integrity,2)}), positive EV (${fmt(EV,2)}), signal cleared. Proceed with monitoring.`;
  } else if (integrity >= 0.4) {
    verdict = 'HOLD';
    reason = `Medium foundation (I=${fmt(integrity,2)}). EV=${fmt(EV,2)}. Recheck in next window.`;
  } else {
    verdict = 'ESCALATE';
    reason = `Signal cleared but integrity (${fmt(integrity,2)}) below autonomous-act floor. Route to human review.`;
  }

  // Coherence seed (for fractal/viz use) — density matrix off-diagonal
  const c_re = r_x / 2;
  const c_im = -r_y / 2;

  return {
    r, r_x, r_y, r_z, theta, phi,
    entropy, purity, coherence, integrity, reversibility, EV,
    tau, tauAuto, signal, oneWayDoor,
    verdict, reason, validation,
    c_re, c_im,
  };
}

// ── PRESETS ───────────────────────────────────────────────
const PRESETS = [
  {
    id:'drone', name:'Drone ROE', subtitle:'Uncertain intel · civilian zone',
    desc:'Autonomous strike drone identifies target matching ROE profile at 91% confidence. Two civilians within 30m radius. Intel age: 4 minutes. Comms with ground partially degraded.',
    state:{E:0.74,S:0.61,R:0.78,Sp:0.42,St:0.46}
  },
  {

    desc:'Strategy detects 47bp dislocation in cross-listed equity pair. Volume regime shifted in last 8s. Risk budget 62% consumed today. Reversibility window: 90 seconds.',
    state:{E:0.81,S:0.92,R:0.39,Sp:0.78,St:0.61}
  },
  {
    id:'av', name:'AV Lane', subtitle:'Pedestrian near',
    desc:'L4 vehicle, 38mph, lane-change opportunity to bypass stalled truck. Pedestrian on adjacent sidewalk, no indication of crossing. Sensor confidence 0.94.',

    state:{E:0.68,S:0.71,R:0.66,Sp:0.58,St:0.55}
  },
  {

    desc:'Agency partner has automated the ad-buy validity step. New offering only dictates buy validity; rest of process is AI-owned. Reversibility limited by 24h commitment window.',
    state:{E:0.59,S:0.98,R:0.42,Sp:0.51,St:0.52}
  },
  {
    id:'launch', name:'Launch Hold', subtitle:'Pad anomaly · T-90s',
    desc:'Sensor 4B reading 2.1σ outside nominal on LOX temp. Other sensors nominal. Weather window closes in 9 minutes. Scrub cost: $4.2M and 11-day delay.',
    state:{E:0.88,S:0.79,R:0.62,Sp:0.55,St:0.49}
  },
];

// ── VERDICT COLORS ────────────────────────────────────────
const VC = {
  COMMIT:   {fg:'#3ddc97', bg:'rgba(61,220,151,0.10)', dim:'#1d8a5a'},
  HOLD:     {fg:'#f5b942', bg:'rgba(245,185,66,0.10)',  dim:'#a37a1f'},
  WAIT:     {fg:'#7aa7ff', bg:'rgba(122,167,255,0.10)', dim:'#3d5fb0'},
  ESCALATE: {fg:'#ff8c42', bg:'rgba(255,140,66,0.12)',  dim:'#b35a18'},
  TOXIC:    {fg:'#ff5c6c', bg:'rgba(255,92,108,0.12)',  dim:'#a02a36'},
};

// ── CONTEXT ───────────────────────────────────────────────
const NervaCtx = createContext(null);

function seedHistory() {
  const seeds = [
    {E:0.32,S:0.71,R:0.22,Sp:0.78,St:0.84,label:'DRN-04412'},
    {E:0.81,S:0.92,R:0.39,Sp:0.78,St:0.61,label:'HFT-09921'},
    {E:0.68,S:0.55,R:0.71,Sp:0.41,St:0.38,label:'DRN-04413'},
    {E:0.52,S:0.83,R:0.31,Sp:0.86,St:0.74,label:'AVL-77108'},
    {E:0.59,S:0.98,R:0.42,Sp:0.51,St:0.52,label:'ADV-30022'},
  ];
  const base = Date.now();
  return seeds.map((s,i) => {
    const m = computeMetrics({...s, tauMode:'auto', tauManual:0.25});
    return {...s,...m, t: base - (5-i)*240000};
  });
}

function NervaProvider({children}) {
  const [state, setState] = useState({
    E:0.59, S:0.98, R:0.42, Sp:0.51, St:0.52,
    tauMode:'auto', tauManual:0.25,
    scenario: PRESETS[4].desc,
    activePreset:'ad',
  });
  const [history] = useState(seedHistory);
  const [parsing, setParsing] = useState(false);
  const [api, setApi] = useState({latency:84, region:'us-west-2', model:'nerva-bloch-v10', status:'nominal', uptime:99.982});

  useEffect(() => {
    const id = setInterval(() => {
      setApi(a => ({...a, latency: clamp(a.latency + (Math.random()-0.5)*14, 55, 190)}));
    }, 2400);
    return () => clearInterval(id);
  }, []);

  const metrics = useMemo(() => computeMetrics(state), [state]);

  // Update nav bar
  useEffect(() => {
    const vEl = document.getElementById('nav-verdict');
    const rEl = document.getElementById('nav-r');
    const tEl = document.getElementById('nav-tau');
    if (vEl) { vEl.textContent = metrics.verdict; vEl.style.color = VC[metrics.verdict]?.fg || '#fff'; }
    if (rEl) rEl.textContent = `|r|=${fmt(metrics.r,3)}`;
    if (tEl) tEl.textContent = `τ=${fmt(metrics.tau,3)}`;
  }, [metrics]);

  const update = useCallback(patch => setState(s => ({...s,...patch})), []);
  const applyPreset = useCallback(id => {
    const p = PRESETS.find(x=>x.id===id);
    if (p) setState(s=>({...s,...p.state, scenario:p.desc, activePreset:id}));
  }, []);

  // AI scenario parser (Claude API via artifact)
  const parseScenario = useCallback(async (text) => {
    if (!text.trim()) return;
    setParsing(true);
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:300,
          messages:[{role:'user', content:`You are NERVA's scenario parser. Extract 5 numeric parameters (0.0–1.0) from this scenario. Reply with ONLY valid JSON, no markdown, no explanation.

Scenario: "${text}"

Parameters:
- E (urgency/emotional pressure): how time-critical or emotionally driven is this? 0=no urgency, 1=maximum urgency
- S (strategy quality): how well-planned/coherent is the approach? 0=no plan, 1=excellent plan
- R (risk exposure): how severe is the downside? 0=no risk, 1=catastrophic/irreversible risk
- Sp (support/evidence): how strong is the data/evidence/confidence? 0=no evidence, 1=certain
- St (stability): how stable is the environment/system? 0=chaotic, 1=very stable

Special calibration:
- Medical emergencies/arterial bleeds/life-threat: E=0.90-0.95, R=0.85-0.95, St=0.15-0.35
- Lethal/weapons/surgical: R ≥ 0.70
- High-frequency trading: E=0.75-0.90, S=0.80-0.95
- Autonomous vehicles normal: R=0.20-0.45, St=0.65-0.85
- Personnel unavailable/comms degraded: St=0.15-0.40
- AI-owned/automated processes: Sp=0.45-0.65

Reply format (JSON only): {"E":0.00,"S":0.00,"R":0.00,"Sp":0.00,"St":0.00}`}]
        })
      });
      const data = await res.json();
      const raw = data.content?.[0]?.text || '';
      const clean = raw.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      const patch = {};
      ['E','S','R','Sp','St'].forEach(k => {
        if (parsed[k] !== undefined) patch[k] = clamp(parseFloat(parsed[k]));
      });
      setState(s => ({...s,...patch, activePreset:''}));
    } catch(e) {
      console.warn('Parse error:', e);
    } finally {
      setParsing(false);
    }
  }, []);

  // Sensitivity analysis
  const sensitivity = useMemo(() => {
    const keys = ['E','S','R','Sp','St'];
    return keys.map(k => {
      const up = computeMetrics({...state,[k]:clamp(state[k]+0.1)});
      const dn = computeMetrics({...state,[k]:clamp(state[k]-0.1)});
      const base = metrics;
      const dUp = (up.r-up.tau) - (base.r-base.tau);
      const dDn = (dn.r-dn.tau) - (base.r-base.tau);
      return {
        key: k,
        dUp, dDn,
        flipUp: up.verdict !== base.verdict ? up.verdict : null,
        flipDn: dn.verdict !== base.verdict ? dn.verdict : null,
      };
    });
  }, [state, metrics]);

  // Factor contributions (signed to |r|)
  const factors = useMemo(() => {
    const {E,S,R,Sp,St} = state;
    return [
      {key:'S',  label:'Strategy',  weight: 0.40*S  - 0.20, raw:S,  good:S>0.5},
      {key:'Sp', label:'Support',   weight: 0.35*Sp - 0.175,raw:Sp, good:Sp>0.5},
      {key:'St', label:'Stability', weight: 0.25*St - 0.125,raw:St, good:St>0.5},
      {key:'R',  label:'Risk',      weight:-0.25*R,          raw:R,  good:R<0.4},
      {key:'E',  label:'Urgency',   weight:-0.12*E*(1-S),    raw:E,  good:E<0.6},
    ];
  }, [state]);

  // Forecast (damped linear on |r| history)
  const forecast = useMemo(() => {
    const horizons = [{label:'T+1m',minutes:1},{label:'T+5m',minutes:5},{label:'T+15m',minutes:15},{label:'T+1h',minutes:60}];
    const all = [...history.map(h=>({t:h.t,r:h.r})), {t:Date.now(),r:metrics.r}];
    const t0 = all[0].t;
    const xs = all.map(p=>(p.t-t0)/60000);
    const ys = all.map(p=>p.r);
    const n = xs.length;
    const mX = xs.reduce((a,b)=>a+b,0)/n, mY = ys.reduce((a,b)=>a+b,0)/n;
    let num=0,den=0;
    xs.forEach((x,i)=>{num+=(x-mX)*(ys[i]-mY);den+=(x-mX)**2;});
    const slope = den===0?0:num/den;
    const HL = 25;
    const points = horizons.map(h=>{
      const damp = Math.exp(-h.minutes/HL);
      const r = clamp(metrics.r + slope*h.minutes*damp);
      const sigma = clamp(0.035+0.022*Math.sqrt(h.minutes)+0.12*metrics.entropy*Math.sqrt(h.minutes/30),0,0.5);
      const lo=clamp(r-sigma), hi=clamp(r+sigma);
      const z=(metrics.tau-r)/Math.max(0.01,sigma);
      const cdf=0.5*(1+Math.sign(-z)*Math.sqrt(1-Math.exp(-2*z*z/Math.PI)));
      const pAbove=clamp(1-cdf);
      let predVerdict;
      if(r<metrics.tau) predVerdict='WAIT';
      else if(metrics.integrity<0.4) predVerdict='ESCALATE';
      else if(metrics.EV>0.1&&metrics.integrity>0.6) predVerdict='COMMIT';
      else predVerdict='HOLD';
      return {...h,r,sigma,lo,hi,pAbove,predVerdict};
    });
    let window;
    if(Math.abs(slope)<0.002) window=metrics.r>=metrics.tau?'ACT NOW — signal stable above τ':'HOLD — signal stable below τ';
    else if(slope>0){
      if(metrics.r>=metrics.tau) window='ACT NOW — signal strengthening';
      else{const need=(metrics.tau-metrics.r)/slope; window=need>60?'WAIT — unlikely to clear τ within 1h':`WAIT — likely to clear τ in ~${Math.max(1,Math.round(need))}m`;}
    } else {
      if(metrics.r>=metrics.tau){const fade=(metrics.r-metrics.tau)/Math.abs(slope); window=fade>60?'ACT THIS HOUR — stable for now':`ACT WITHIN ~${Math.max(1,Math.round(fade))}m — signal decaying`;}
      else window='HOLD — signal decaying below τ';
    }
    return {slope,points,window,histR:ys};
  }, [history, metrics, state]);

  const logs = useMemo(() => [
    {t:'',sev:'I',src:'parse',   msg:`scenario tokens=${Math.floor(state.scenario.length/4)} model=nerva-bloch-v10`},
    {t:'',sev:'I',src:'extract', msg:`E=${fmt(state.E,2)} S=${fmt(state.S,2)} R=${fmt(state.R,2)} Sp=${fmt(state.Sp,2)} St=${fmt(state.St,2)}`},
    {t:'',sev:metrics.oneWayDoor?'W':'I',src:'brake',   msg:`reversibility=${fmt(metrics.reversibility,2)} ${metrics.oneWayDoor?'ONE-WAY ARMED':'disarmed'}`},
    {t:'',sev:'I',src:'bloch',   msg:`r_x=${fmt(metrics.r_x,4)} r_y=${fmt(metrics.r_y,4)} r_z=${fmt(metrics.r_z,4)}`},
    {t:'',sev:'I',src:'compute', msg:`|r|=${fmt(metrics.r,4)} τ=${fmt(metrics.tau,4)} S(ρ)=${fmt(metrics.entropy,4)}`},
    {t:'',sev:metrics.verdict==='TOXIC'||metrics.verdict==='ESCALATE'?'E':'I',src:'verdict',msg:`${metrics.verdict} · purity=${fmt(metrics.purity,4)} ∈ [0.5,1]`},
    {t:'',sev:'I',src:'audit',   msg:`components_consistent=${metrics.validation.components_consistent} hash=ok`},
    {t:'',sev:'I',src:'route',   msg:metrics.verdict==='ESCALATE'||metrics.verdict==='TOXIC'?'human #decision-review-p0':'auto-dispatch ok'},
  ], [state, metrics]);

  const value = {state,update,applyPreset,parseScenario,parsing,metrics,sensitivity,factors,forecast,history,logs,api,presets:PRESETS,VC};
  return React.createElement(NervaCtx.Provider, {value}, children);
}

function useNerva() {
  const v = useContext(NervaCtx);
  if (!v) throw new Error('useNerva outside NervaProvider');
  return v;
}

// ── SHARED COMPONENTS ─────────────────────────────────────
function Spark({values, w=80, h=18, stroke='currentColor'}) {
  if (!values?.length) return null;
  const max=Math.max(...values,0.01), min=Math.min(...values,0);
  const rng=max-min||1;
  const pts=values.map((v,i)=>{
    const x=(i/(values.length-1))*w;
    const y=h-((v-min)/rng)*h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return <svg width={w} height={h} style={{display:'block',overflow:'visible'}}><polyline points={pts} fill="none" stroke={stroke} strokeWidth="1.3" strokeLinejoin="round" strokeLinecap="round"/></svg>;
}

// Phase map SVG (shared across views)
function PhaseMap({metrics, state, W=320, H=220, mono="'JetBrains Mono',monospace"}) {
  const x = state.E * W;
  const y = (1 - metrics.integrity) * H;
  const c = VC[metrics.verdict];
  const zones=[
    {name:'COMMIT', x0:0,y0:0,w:W,h:H*0.35, c:VC.COMMIT.fg},
    {name:'HOLD',   x0:0,y0:H*0.35,w:W*0.5,h:H*0.30, c:VC.HOLD.fg},
    {name:'ESC',    x0:W*0.5,y0:H*0.35,w:W*0.5,h:H*0.30, c:VC.ESCALATE.fg},
    {name:'ESC',    x0:0,y0:H*0.65,w:W*0.5,h:H*0.35, c:VC.ESCALATE.fg},
    {name:'TOXIC',  x0:W*0.5,y0:H*0.65,w:W*0.5,h:H*0.35, c:VC.TOXIC.fg},
  ];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:'100%',display:'block',background:'#070a0e'}}>
      {zones.map((z,i)=>(
        <g key={i}>
          <rect x={z.x0} y={z.y0} width={z.w} height={z.h} fill={z.c} opacity={0.10}/>
          <text x={z.x0+z.w/2} y={z.y0+z.h/2+4} textAnchor="middle" style={{font:`600 9px ${mono}`,fill:z.c,letterSpacing:'0.18em',opacity:0.6}}>{z.name}</text>
        </g>
      ))}
      {[0.25,0.5,0.75].map(t=>(
        <g key={t}>
          <line x1={t*W} y1="0" x2={t*W} y2={H} stroke="rgba(255,255,255,0.05)" strokeDasharray="2 3"/>
          <line x1="0" y1={t*H} x2={W} y2={t*H} stroke="rgba(255,255,255,0.05)" strokeDasharray="2 3"/>
        </g>
      ))}
      <line x1="0" y1={H*0.35} x2={W} y2={H*0.35} stroke="rgba(255,255,255,0.1)"/>
      <line x1="0" y1={H*0.65} x2={W} y2={H*0.65} stroke="rgba(255,255,255,0.1)"/>
      <line x1={W*0.5} y1={H*0.35} x2={W*0.5} y2={H} stroke="rgba(255,255,255,0.1)"/>
      {/* τ threshold line on integrity axis */}
      <line x1="0" y1={(1-metrics.tau)*H} x2={W} y2={(1-metrics.tau)*H} stroke={c.fg} strokeDasharray="4 3" strokeWidth="1" opacity="0.5"/>
      <text x={W-4} y={(1-metrics.tau)*H-4} textAnchor="end" style={{font:`9px ${mono}`,fill:c.fg,opacity:0.7}}>τ</text>
      {/* ellipse */}
      <ellipse cx={x} cy={y} rx={22} ry={16} fill={c.fg} opacity={0.10}/>
      <line x1="0" y1={y} x2={W} y2={y} stroke={c.fg} strokeDasharray="3 4" strokeWidth="0.7" opacity="0.35"/>
      <line x1={x} y1="0" x2={x} y2={H} stroke={c.fg} strokeDasharray="3 4" strokeWidth="0.7" opacity="0.35"/>
      <circle cx={x} cy={y} r={metrics.signal?6:5} fill={metrics.signal?c.fg:'none'} opacity={metrics.signal?1:0.4}/>
      <circle cx={x} cy={y} r="10" fill="none" stroke={c.fg} strokeWidth="1" opacity={metrics.signal?0.5:0.2}/>
      {!metrics.signal && <circle cx={x} cy={y} r="5" fill={c.fg} opacity="0.3"/>}
    </svg>
  );
}

function CPGauge({value, tau, verdict}) {
  const c = VC[verdict];
  const sz=220, cx=110, cy=110, rO=96, rI=72;
  const a0=-135, a1=135;
  const ticks=[];
  for(let i=0;i<=30;i++){
    const t=i/30, ang=(a0+(a1-a0)*t)*Math.PI/180;
    const major=i%5===0, active=t<=value;
    ticks.push(<line key={i}
      x1={cx+Math.cos(ang)*(rO+2)} y1={cy+Math.sin(ang)*(rO+2)}
      x2={cx+Math.cos(ang)*(rO+(major?10:5))} y2={cy+Math.sin(ang)*(rO+(major?10:5))}
      stroke={active?c.fg:'rgba(255,255,255,0.15)'} strokeWidth={major?1.5:0.7}/>);
  }
  const vAng=(a0+(a1-a0)*value)*Math.PI/180;
  const tAng=(a0+(a1-a0)*tau)*Math.PI/180;
  const arcEnd=a0+(a1-a0)*value, large=Math.abs(arcEnd-a0)>180?1:0;
  const arcPath=`M ${cx+Math.cos(a0*Math.PI/180)*rI} ${cy+Math.sin(a0*Math.PI/180)*rI} A ${rI} ${rI} 0 ${large} 1 ${cx+Math.cos(arcEnd*Math.PI/180)*rI} ${cy+Math.sin(arcEnd*Math.PI/180)*rI}`;
  const mono="'JetBrains Mono',monospace";
  return (
    <div style={{position:'relative',width:sz,height:sz,alignSelf:'center'}}>
      <svg width={sz} height={sz} style={{position:'absolute',inset:0}}>
        <circle cx={cx} cy={cy} r={rO} fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
        {ticks}
        <path d={arcPath} fill="none" stroke={c.fg} strokeWidth="3" opacity="0.9"/>
        <line x1={cx+Math.cos(tAng)*(rO-4)} y1={cy+Math.sin(tAng)*(rO-4)} x2={cx+Math.cos(tAng)*(rO+14)} y2={cy+Math.sin(tAng)*(rO+14)} stroke="#fff" strokeWidth="1.5" strokeDasharray="2 2"/>
        <line x1={cx} y1={cy} x2={cx+Math.cos(vAng)*(rI-6)} y2={cy+Math.sin(vAng)*(rI-6)} stroke={c.fg} strokeWidth="2.5" strokeLinecap="round"/>
        <circle cx={cx} cy={cy} r="5" fill="#0a0d12" stroke={c.fg} strokeWidth="2"/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
        <div style={{font:`600 11px/1 ${mono}`,color:c.fg,letterSpacing:'0.22em',marginBottom:6}}>{verdict}</div>
        <div style={{font:`300 36px/1 ${mono}`,color:'#d8dde6'}}>{fmt(value,3)}</div>
        <div style={{font:`9.5px/1 ${mono}`,color:'rgba(216,221,230,0.5)',marginTop:6}}>|r| · τ {fmt(tau,3)}</div>
      </div>
    </div>
  );
}

        )}
        {tile('History','last 5',
          <div style={{display:'flex',flexDirection:'column',gap:4,font:`10.5px/1.3 ${mono}`}}>
            {history.slice().reverse().map((h,i)=>{
              const hc=VC[h.verdict];
              const mins=Math.round((Date.now()-h.t)/60000);
              return (
                <div key={i} style={{display:'grid',gridTemplateColumns:'40px 1fr 44px 44px',gap:5,alignItems:'center'}}>
                  <span style={{color:'rgba(216,221,230,0.35)'}}>{mins}m</span>

                  <span style={{color:'rgba(216,221,230,0.4)',textAlign:'right'}}>{fmt(h.r,2)}</span>
                  <span style={{color:hc.fg,fontWeight:600,textAlign:'right',fontSize:9.5,letterSpacing:'0.1em'}}>{h.verdict.slice(0,4)}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function BloombergView() {

  const blk=' ▁▂▃▄▅▆▇█';

      </div>
      <div style={{flex:1,minHeight:0,padding:6,fontFamily:blx.mono,fontSize:11,lineHeight:1.4,color:blx.text,overflow:'hidden',display:'flex',flexDirection:'column'}}>{children}</div>
    </div>
  );
  const bar=(v,w=24,col=blx.text)=>{const f=Math.round(v*w);return <span style={{color:col,letterSpacing:'-0.05em'}}>{'█'.repeat(f)}<span style={{color:blx.line}}>{'░'.repeat(w-f)}</span></span>;};

  return (
    <div style={{width:'100%',height:'100%',background:blx.bg,color:blx.text,fontFamily:blx.mono,fontSize:11,display:'grid',gridTemplateRows:'24px 1fr 22px',overflow:'hidden'}}>
      {/* topbar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 8px',background:blx.text,color:'#000',font:`600 11px/1 ${blx.mono}`,letterSpacing:'0.04em'}}>
        <div style={{display:'flex',gap:16}}><span>NERVA&lt;GO&gt;</span><span>DECISION INTEGRITY TERMINAL v10.0</span><span style={{opacity:0.6}}>SES 7F-2A91</span></div>
        <div style={{display:'flex',gap:12}}><span>{api.region.toUpperCase()}</span><span>{Math.round(api.latency)}MS</span><span>99.982%</span><span>{new Date().toTimeString().slice(0,8)}</span></div>
      </div>

      {/* grid */}
      <div style={{display:'grid',gridTemplateColumns:'260px 1fr 1fr 240px',gridTemplateRows:'1fr 1fr 140px',gap:1,background:blx.line,overflow:'hidden'}}>
        {/* INP */}
        {panel('INP','INPUTS','OPERATOR',
          <>
            <div style={{color:blx.hi,fontSize:10.5,lineHeight:1.5,marginBottom:6,maxHeight:60,overflow:'hidden'}}>{state.scenario}</div>
            <div style={{display:'flex',gap:4,marginBottom:6}}>
              <button onClick={()=>parseScenario(state.scenario)} disabled={parsing} style={{flex:1,background:parsing?'transparent':'rgba(247,201,72,0.12)',border:`1px solid ${parsing?blx.line:blx.text}`,color:parsing?blx.dim:blx.text,font:`700 10px/1 ${blx.mono}`,letterSpacing:'0.08em',padding:'4px 0'}}>
                {parsing?'PARSING...':'F2 · PARSE'}
              </button>
              <div style={{display:'flex',gap:2,flexWrap:'wrap'}}>
                {presets.slice(0,3).map(p=><button key={p.id} onClick={()=>applyPreset(p.id)} style={{background:state.activePreset===p.id?blx.text:'transparent',color:state.activePreset===p.id?'#000':blx.dim,border:`1px solid ${blx.line}`,font:`9px/1 ${blx.mono}`,padding:'3px 6px'}}>{p.id.toUpperCase()}</button>)}
              </div>
            </div>
            <div style={{font:`9.5px/1 ${blx.mono}`,color:blx.dim,letterSpacing:'0.1em',marginBottom:4}}>PARAMETERS (0.000–1.000)</div>
            {[['E','URGENCY',state.E,v=>update({E:v}),blx.orange],['S','STRATEGY',state.S,v=>update({S:v}),blx.green],['R','RISK',state.R,v=>update({R:v}),blx.red],['Sp','SUPPORT',state.Sp,v=>update({Sp:v}),blx.blue],['St','STABILITY',state.St,v=>update({St:v}),blx.mauve]].map(([sym,lbl,val,set,col])=>(
              <div key={sym} style={{marginBottom:5}}>
                <div style={{display:'flex',justifyContent:'space-between'}}><span style={{color:blx.hi}}>{sym} {lbl}</span><span>{fmt(val,3)}</span></div>
                <div style={{height:3,background:blx.lineHi,position:'relative',marginBottom:1}}>
                  <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${val*100}%`,background:col}}/>
                </div>
                <input type="range" min="0" max="1" step="0.01" value={val} onChange={e=>set(parseFloat(e.target.value))} style={{accentColor:col,color:col,width:'100%',height:2}}/>
              </div>
            ))}
            <div style={{marginTop:4}}>
              <div style={{display:'flex',gap:4}}>
                {['auto','manual'].map(m=><button key={m} onClick={()=>update({tauMode:m})} style={{flex:1,background:state.tauMode===m?blx.text:'transparent',color:state.tauMode===m?'#000':blx.dim,border:`1px solid ${blx.line}`,font:`9px/1 ${blx.mono}`,letterSpacing:'0.08em',padding:'3px 0'}}>{m.toUpperCase()}</button>)}
              </div>
              {state.tauMode==='manual'&&<input type="range" min="0.15" max="0.85" step="0.01" value={state.tauManual} onChange={e=>update({tauManual:parseFloat(e.target.value)})} style={{accentColor:blx.text,color:blx.text,width:'100%',marginTop:3}}/>}
            </div>
          </>,
          {gridRow:'span 2'}
        )}

        {/* VRD */}
        {panel('VRD','VERDICT','',
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:8,borderBottom:`1px solid ${blx.lineHi}`,paddingBottom:6,marginBottom:4}}>
              {[[metrics.r,'|r|'],[metrics.tau,'τ'],[metrics.EV,'EV'],[metrics.theta+'°','θ'],[metrics.phi+'°','Φ'],].map(([v,l])=>(
                <div key={l}><div style={{color:blx.dim,fontSize:9.5}}>{l}</div><div style={{color:blx.hi,fontSize:19,fontWeight:300}}>{typeof v==='number'?fmt(v,3):v}</div></div>
              ))}
            </div>
            <div style={{fontSize:32,fontWeight:700,color:vc[metrics.verdict],letterSpacing:'0.08em',lineHeight:1}}>{metrics.verdict}</div>
            <div style={{fontSize:11,color:blx.hi,marginTop:2}}>{'>'} {metrics.reason.slice(0,80)}</div>
            <div style={{fontSize:10,color:blx.dim}}>CONFIDENCE BAND: |r| ± {fmt(metrics.entropy*0.15,2)} · σ {fmt(metrics.entropy,2)}</div>
          </div>
        )}

        {/* FCT */}
        {panel('FCT','FORECAST',`slope ${forecast.slope>=0?'+':''}${fmt(forecast.slope*1000,1)}·10⁻³`,
          <div style={{display:'flex',flexDirection:'column',gap:3}}>
            <div style={{display:'grid',gridTemplateColumns:'44px 52px 38px 1fr',gap:4,color:blx.dim,fontSize:9.5,borderBottom:`1px solid ${blx.line}`,paddingBottom:2}}>
              <span>HZN</span><span>|r|̂</span><span style={{textAlign:'right'}}>±σ</span><span style={{textAlign:'right'}}>P(≥τ)</span>
            </div>
            {forecast.points.map(p=>{
              const cleared=p.r>=metrics.tau;
              const col=cleared?blx.green:blx.red;
              const f=Math.round(p.pAbove*10);
              return (
                <div key={p.label} style={{display:'grid',gridTemplateColumns:'44px 52px 38px 1fr',gap:4,alignItems:'center'}}>
                  <span style={{color:blx.hi}}>{p.label}</span>
                  <span style={{color:col}}>{fmt(p.r,3)}</span>
                  <span style={{color:blx.dim,textAlign:'right'}}>{fmt(p.sigma,2)}</span>
                  <span style={{textAlign:'right',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4}}>
                    <span style={{color:col,letterSpacing:'-0.05em'}}>{'█'.repeat(f)}<span style={{color:blx.line}}>{'░'.repeat(10-f)}</span></span>
                    <span style={{color:col,width:26,textAlign:'right'}}>{Math.round(p.pAbove*100)}%</span>
                  </span>
                </div>
              );
            })}
            <div style={{marginTop:'auto',borderTop:`1px solid ${blx.line}`,paddingTop:4}}>
              <div style={{color:blx.dim,fontSize:9.5}}>RECOMMENDATION</div>
              <div style={{color:forecast.window.startsWith('ACT')?blx.green:forecast.window.startsWith('HOLD')?blx.orange:blx.text,marginTop:2}}>▶ {forecast.window}</div>
            </div>
          </div>
        )}

        {/* MAP */}
        {panel('MAP','PHASE MAP',`E:${fmt(state.E,2)} · I:${fmt(metrics.integrity,2)}`,
          <div style={{flex:1,minHeight:0}}><PhaseMap metrics={metrics} state={state} W={260} H={160} mono={blx.mono}/></div>
        )}

        {/* QLT */}
        {panel('QLT','QUALITY METRICS','0.000–1.000',
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {[['INTEGRITY ',metrics.integrity,blx.green],['COHERENCE ',metrics.coherence,blx.blue],['PURITY    ',metrics.purity,blx.mauve],['REVERSIBLE',metrics.reversibility,'#c084fc'],['ENTROPY   ',metrics.entropy,blx.orange],['EXP-VALUE ',(metrics.EV+1)/2,metrics.EV>0?blx.green:blx.red]].map(([l,v,col])=>(
              <div key={l} style={{display:'grid',gridTemplateColumns:'90px 1fr 50px',gap:5,alignItems:'center'}}>
                <span style={{color:blx.dim,fontSize:10.5}}>{l}</span>
                {bar(v,22,col)}
                <span style={{color:col,textAlign:'right'}}>{fmt(v,3)}</span>
              </div>
            ))}
          </div>
        )}

        {/* FAC */}
        {panel('FAC','FACTOR CONTRIBUTIONS','signed to |r|',
          <div style={{display:'flex',flexDirection:'column',gap:3}}>
            <div style={{display:'grid',gridTemplateColumns:'60px 1fr 50px 50px',gap:4,color:blx.dim,fontSize:9.5,borderBottom:`1px solid ${blx.line}`,paddingBottom:2}}>
              <span>FACTOR</span><span>WEIGHT</span><span style={{textAlign:'right'}}>RAW</span><span style={{textAlign:'right'}}>FLAG</span>
            </div>
            {factors.map(f=>{
              const pos=f.weight>=0;
              const mag=Math.min(11,Math.round(Math.abs(f.weight)*(11/0.3)));
              const bar2=pos?' '.repeat(11)+'+'+'█'.repeat(mag)+'·'.repeat(11-mag):' '.repeat(11-mag)+'█'.repeat(mag)+'-'+'·'.repeat(11);
              return (
                <div key={f.key} style={{display:'grid',gridTemplateColumns:'60px 1fr 50px 50px',gap:4,alignItems:'center'}}>
                  <span style={{color:blx.hi}}>{f.label.toUpperCase().slice(0,8)}</span>
                  <span style={{color:pos?blx.green:blx.red,whiteSpace:'pre',fontSize:10,letterSpacing:'-0.04em'}}>{bar2}</span>
                  <span style={{color:blx.text,textAlign:'right'}}>{fmt(f.raw,2)}</span>
                  <span style={{color:pos?blx.green:blx.red,textAlign:'right'}}>{pos?'+':''}{fmt(f.weight,3)}</span>
                </div>
              );
            })}
          </div>
        )}

        {/* SEN */}
        {panel('SEN','SENSITIVITY ANALYSIS','δ = ±0.10',
          <>
            <div style={{display:'grid',gridTemplateColumns:'36px 90px 1fr 90px',gap:4,color:blx.dim,fontSize:9.5,borderBottom:`1px solid ${blx.line}`,paddingBottom:2,marginBottom:4}}>
              <span>PAR</span><span>−0.10</span><span style={{textAlign:'center'}}>Δ(|r|-τ)</span><span style={{textAlign:'right'}}>+0.10</span>
            </div>
            {sensitivity.map(s=>(
              <div key={s.key} style={{display:'grid',gridTemplateColumns:'36px 90px 1fr 90px',gap:4,alignItems:'center',fontSize:11}}>
                <span style={{color:blx.hi}}>{s.key}</span>
                <span style={{color:s.flipDn?vc[s.flipDn]:blx.dim}}>{s.flipDn?`▶ ${s.flipDn.slice(0,4)}`:'— stable'}</span>
                <span style={{color:blx.text,textAlign:'center'}}>{s.dDn>=0?'+':''}{fmt(s.dDn,3)} / {s.dUp>=0?'+':''}{fmt(s.dUp,3)}</span>
                <span style={{color:s.flipUp?vc[s.flipUp]:blx.dim,textAlign:'right'}}>{s.flipUp?`${s.flipUp.slice(0,4)} ◀`:'stable —'}</span>
              </div>
            ))}
          </>
        )}

        {/* HST + LOG */}
        {panel('HST','DECISION HISTORY','last 5',
          <div style={{display:'flex',flexDirection:'column',gap:3}}>
            {history.slice().reverse().map((h,i)=>{
              const hc=vc[h.verdict];
              const mins=Math.round((Date.now()-h.t)/60000);
              return (
                <div key={i} style={{display:'grid',gridTemplateColumns:'40px 80px 48px 1fr',gap:4}}>
                  <span style={{color:blx.dim}}>{mins}m</span>
                  <span style={{color:blx.hi}}>{h.label}</span>
                  <span style={{textAlign:'right'}}>{fmt(h.r,2)}</span>
                  <span style={{color:hc,textAlign:'right',fontWeight:600}}>{h.verdict}</span>
                </div>
              );
            })}
            <div style={{marginTop:'auto',color:blx.dim,fontSize:10}}>
              TRACE {spark(history.map(h=>h.r).concat([metrics.r]))}
            </div>
          </div>
        )}
        {panel('LOG','AGENT LOG','streaming',
          <div style={{display:'flex',flexDirection:'column',gap:1,fontSize:10.5}}>
            {logs.map((l,i)=>{
              const sc=l.sev==='E'?blx.red:l.sev==='W'?blx.orange:blx.dim;
              return (
                <div key={i} style={{display:'grid',gridTemplateColumns:'12px 44px 1fr',gap:4}}>
                  <span style={{color:sc}}>{l.sev}</span>
                  <span style={{color:blx.blue}}>{l.src}</span>
                  <span style={{color:blx.hi,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.msg}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* statusbar */}
      <div style={{background:blx.text,color:'#000',padding:'0 8px',display:'flex',alignItems:'center',justifyContent:'space-between',font:`600 11px/1 ${blx.mono}`,letterSpacing:'0.04em'}}>
        <div style={{display:'flex',gap:12}}><span>F1:HELP</span><span>F2:PARSE</span><span>F3:LOAD</span><span>F4:SAVE</span><span>F5:COMPARE</span><span>F6:AUDIT</span><span>F9:OVERRIDE</span></div>
        <div style={{display:'flex',gap:12}}><span>{metrics.verdict}</span><span>|r|={fmt(metrics.r,3)}</span><span>τ={fmt(metrics.tau,3)}</span><span style={{background:'#000',color:blx.green,padding:'0 6px'}}>● LIVE</span></div>
      </div>
    </div>
  );
}

function PhaseSpaceView() {

  const psx={bg:'#f5f1e8',paper:'#fbf8f0',ink:'#1a1814',dim:'rgba(26,24,20,0.62)',faint:'rgba(26,24,20,0.38)',rule:'rgba(26,24,20,0.15)',ruleHi:'rgba(26,24,20,0.35)',accent:'#a3361b',serif:'"Newsreader","Georgia",serif',sans:'"IBM Plex Sans",system-ui,sans-serif',mono:'"JetBrains Mono",monospace'};
  const psvc={COMMIT:{fg:'#2e6f3e',bg:'rgba(46,111,62,0.08)'},HOLD:{fg:'#8a6a1a',bg:'rgba(138,106,26,0.08)'},WAIT:{fg:'#2a4a8a',bg:'rgba(42,74,138,0.08)'},ESCALATE:{fg:'#a3531b',bg:'rgba(163,83,27,0.08)'},TOXIC:{fg:'#a3361b',bg:'rgba(163,54,27,0.10)'}};

  const W=580,H=400,M={l:50,r:30,t:28,b:42};
  const pw=W-M.l-M.r,ph=H-M.t-M.b;
  const xp=v=>M.l+v*pw, yp=v=>M.t+(1-v)*ph;
  const px_=xp(state.E), py_=yp(metrics.integrity);
  const rx=14+metrics.entropy*32, ry=10+metrics.entropy*22;

  return (
    <div style={{width:'100%',height:'100%',background:psx.bg,color:psx.ink,fontFamily:psx.sans,overflow:'hidden',display:'grid',gridTemplateRows:'auto 1fr'}}>
      {/* masthead */}
      <header style={{padding:'12px 24px 10px',borderBottom:`1px solid ${psx.ink}`,background:psx.paper,display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
        <div>
          <div style={{font:`10px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em'}}>VOL. 10 · ISSUE 0 · {new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'}).toUpperCase()} · INTERNAL REVIEW</div>
          <h1 style={{margin:'4px 0 0',font:`400 28px/1 ${psx.serif}`,letterSpacing:'-0.02em',color:psx.ink}}>Nerva <em>—</em> a decision integrity engine</h1>
          <div style={{font:`italic 12.5px/1.3 ${psx.serif}`,color:psx.dim,marginTop:3}}>Phase-space evaluation · Bloch sphere kernel v10.0 · {metrics.validation.components_consistent?'✓ components consistent':'⚠ check components'}</div>
        </div>
        <div style={{textAlign:'right',font:`10px/1.5 ${psx.mono}`,color:psx.faint}}>
          <div style={{color:psx.ink}}>SESSION 7F-2A91</div>
          <div>nerva-bloch-v10 · {api.region}</div>
          <div>{Math.round(api.latency)}ms · {api.uptime}%</div>
          <div style={{color:psvc.COMMIT.fg}}>● {api.status}</div>
        </div>
      </header>

      {/* 3-col body */}
      <div style={{display:'grid',gridTemplateColumns:'260px 1fr 260px',minHeight:0,overflow:'hidden'}}>
        {/* LEFT */}
        <aside style={{padding:'14px 18px',borderRight:`1px solid ${psx.rule}`,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',marginBottom:5}}>§ 1 — SCENARIO</div>
          <textarea value={state.scenario} onChange={e=>update({scenario:e.target.value})} style={{background:'transparent',font:`12.5px/1.5 ${psx.serif}`,color:psx.ink,height:70,padding:0,marginBottom:6}}/>
          <button onClick={()=>parseScenario(state.scenario)} disabled={parsing} style={{background:parsing?'transparent':c.bg,border:`1px solid ${c.fg}`,color:c.fg,font:`italic 12px ${psx.serif}`,padding:'5px 0',marginBottom:8}}>
            {parsing?'parsing…':'⚡ parse with AI'}
          </button>
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',marginBottom:4}}>CASES IN CORPUS</div>
          <div style={{display:'flex',flexDirection:'column',borderTop:`1px solid ${psx.rule}`}}>
            {presets.map(p=>(
              <button key={p.id} onClick={()=>applyPreset(p.id)} style={{background:state.activePreset===p.id?c.bg:'transparent',border:'none',borderBottom:`1px solid ${psx.rule}`,textAlign:'left',cursor:'pointer',padding:'5px 2px',color:psx.ink}}>
                <span style={{font:`500 12.5px/1 ${psx.serif}`,color:state.activePreset===p.id?psx.accent:psx.ink}}>{p.name}</span>
                <span style={{font:`9px ${psx.mono}`,color:psx.faint,marginLeft:6}}>{p.id.toUpperCase()}</span>
              </button>
            ))}
          </div>
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',margin:'10px 0 5px'}}>§ 2 — PARAMETERS</div>
          {[['E','Urgency','emotional / pressure',state.E,v=>update({E:v})],['S','Strategy','plan coherence',state.S,v=>update({S:v})],['R','Risk','exposure to neg. outcomes',state.R,v=>update({R:v})],['Sp','Support','data confidence',state.Sp,v=>update({Sp:v})],['St','Stability','system health',state.St,v=>update({St:v})]].map(([sym,lbl,sub,val,set])=>(
            <div key={sym} style={{display:'flex',flexDirection:'column',gap:2,padding:'5px 0',borderBottom:`1px solid ${psx.rule}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                <span style={{font:`12.5px/1 ${psx.serif}`,color:psx.ink}}><em style={{color:psx.accent,marginRight:5}}>{sym}</em>{lbl}</span>
                <span style={{font:`11px/1 ${psx.mono}`,color:psx.ink}}>{fmt(val,2)}</span>

              <input type="range" min="0" max="1" step="0.01" value={val} onChange={e=>set(parseFloat(e.target.value))} style={{accentColor:psx.accent,width:'100%'}}/>
            </div>
          ))}
        </aside>

        {/* CENTER */}
        <main style={{padding:'14px 20px',overflow:'hidden',display:'grid',gridTemplateRows:'auto 1fr auto',gap:10,minHeight:0}}>

          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:16,alignItems:'start',paddingBottom:10,borderBottom:`1px solid ${psx.rule}`}}>

              <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.2em'}}>RESULT</div>
              <div style={{font:`400 26px/1 ${psx.serif}`,color:c.fg,marginTop:3}}>{metrics.verdict.charAt(0)+metrics.verdict.slice(1).toLowerCase()}</div>
              <div style={{font:`italic 10.5px ${psx.serif}`,color:psx.dim,marginTop:2}}>|r|={fmt(metrics.r,3)} · τ={fmt(metrics.tau,3)}</div>

            <div style={{font:`italic 12.5px/1.55 ${psx.serif}`,color:psx.ink,columnCount:2,columnGap:20,textIndent:'1em'}}>
              {metrics.reason} Bloch vector: ({fmt(metrics.r_x,4)}, {fmt(metrics.r_y,4)}, {fmt(metrics.r_z,4)}). Purity Tr(ρ²)={fmt(metrics.purity,4)} ∈ [0.5,1]. S(ρ)={fmt(metrics.entropy,4)}. Components consistent: {metrics.validation.components_consistent?'yes':'NO — check normalization'}.

                <rect x={M.l} y={M.t+ph*0.35} width={pw*0.5} height={ph*0.30} fill={psvc.HOLD.fg} opacity="0.07"/>
                <rect x={M.l+pw*0.5} y={M.t+ph*0.35} width={pw*0.5} height={ph*0.30} fill={psvc.ESCALATE.fg} opacity="0.07"/>
                <rect x={M.l} y={M.t+ph*0.65} width={pw*0.5} height={ph*0.35} fill={psvc.ESCALATE.fg} opacity="0.07"/>
                <rect x={M.l+pw*0.5} y={M.t+ph*0.65} width={pw*0.5} height={ph*0.35} fill={psvc.TOXIC.fg} opacity="0.09"/>

                <line x1={M.l} y1={yp(metrics.tau)} x2={M.l+pw} y2={yp(metrics.tau)} stroke={c.fg} strokeDasharray="4 3" strokeWidth="1" opacity="0.6"/>
                <text x={M.l+pw-2} y={yp(metrics.tau)-4} textAnchor="end" style={{font:`9.5px ${psx.mono}`,fill:c.fg,opacity:0.7}}>τ={fmt(metrics.tau,3)}</text>
                {/* zone labels */}
                {[['COMMIT',0.5,0.18,psvc.COMMIT.fg],['HOLD',0.25,0.52,psvc.HOLD.fg],['ESCALATE',0.75,0.52,psvc.ESCALATE.fg],['ESCALATE',0.25,0.85,psvc.ESCALATE.fg],['TOXIC',0.75,0.85,psvc.TOXIC.fg]].map(([n,xi,yi,col])=>(
                  <text key={n+xi} x={xp(xi)} y={yp(1-yi)} textAnchor="middle" style={{font:`italic 13px ${psx.serif}`,fill:col,opacity:0.7}}>{n}</text>
                ))}
                {/* grid */}
                {[0,0.25,0.5,0.75,1].map(t=>(
                  <g key={t}>
                    <line x1={xp(t)} y1={M.t} x2={xp(t)} y2={M.t+ph} stroke={psx.rule} strokeDasharray="2 3"/>
                    <line x1={M.l} y1={yp(t)} x2={M.l+pw} y2={yp(t)} stroke={psx.rule} strokeDasharray="2 3"/>
                    <text x={xp(t)} y={M.t+ph+16} textAnchor="middle" style={{font:`10px ${psx.mono}`,fill:psx.faint}}>{t.toFixed(2)}</text>
                    <text x={M.l-6} y={yp(t)+3} textAnchor="end" style={{font:`10px ${psx.mono}`,fill:psx.faint}}>{t.toFixed(2)}</text>
                  </g>
                ))}
                {/* axes */}
                <line x1={M.l} y1={M.t} x2={M.l} y2={M.t+ph} stroke={psx.ink} strokeWidth="1.2"/>
                <line x1={M.l} y1={M.t+ph} x2={M.l+pw} y2={M.t+ph} stroke={psx.ink} strokeWidth="1.2"/>
                <line x1={M.l} y1={yp(0.35)} x2={M.l+pw} y2={yp(0.35)} stroke={psx.ruleHi}/>
                <line x1={M.l} y1={yp(0.65)} x2={M.l+pw} y2={yp(0.65)} stroke={psx.ruleHi}/>
                <line x1={xp(0.5)} y1={yp(0.65)} x2={xp(0.5)} y2={M.t+ph} stroke={psx.ruleHi}/>
                <text x={M.l+pw/2} y={H-6} textAnchor="middle" style={{font:`italic 11.5px ${psx.serif}`,fill:psx.ink}}>Urgency  E</text>
                <text x={13} y={M.t+ph/2} textAnchor="middle" transform={`rotate(-90 13 ${M.t+ph/2})`} style={{font:`italic 11.5px ${psx.serif}`,fill:psx.ink}}>Integrity</text>
                {/* history trail */}
                {history.map((h,i)=><circle key={i} cx={xp(h.E)} cy={yp(h.integrity)} r="2.5" fill={psvc[h.verdict]?.fg||psx.faint} opacity={0.2+i*0.08}/>)}
                {history.length>0&&<polyline points={history.map(h=>`${xp(h.E)},${yp(h.integrity)}`).concat([`${px_},${py_}`]).join(' ')} fill="none" stroke={psx.faint} strokeWidth="0.8" strokeDasharray="3 3"/>}
                {/* confidence ellipse */}
                <ellipse cx={px_} cy={py_} rx={rx} ry={ry} fill="none" stroke={c.fg} strokeWidth="0.8" strokeDasharray="2 2" opacity="0.7"/>
                <ellipse cx={px_} cy={py_} rx={rx*0.5} ry={ry*0.5} fill={c.fg} opacity="0.10"/>
                {/* dot */}
                <circle cx={px_} cy={py_} r="7" fill="none" stroke={c.fg} strokeWidth="1.5"/>
                <circle cx={px_} cy={py_} r="3.5" fill={metrics.signal?c.fg:'none'} stroke={c.fg} strokeWidth="1"/>
                <line x1={px_+6} y1={py_-6} x2={px_+30} y2={py_-20} stroke={c.fg} strokeWidth="0.8"/>
                <text x={px_+34} y={py_-22} style={{font:`italic 11.5px ${psx.serif}`,fill:c.fg}}>{metrics.verdict.toLowerCase()} · |r|={fmt(metrics.r,2)}</text>
              </svg>
            </div>
            <figcaption style={{marginTop:5,font:`11px/1.45 ${psx.sans}`,color:psx.dim}}>
              <span style={{font:`600 10.5px ${psx.mono}`,color:psx.ink,marginRight:5}}>FIG. 1</span>
              Phase diagram. τ={fmt(metrics.tau,3)} (dashed line). Dashed envelope = entropy-scaled confidence. Trail = last {history.length} decisions.
            </figcaption>
          </figure>

          {/* bottom metrics row */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',borderTop:`1px solid ${psx.ink}`,paddingTop:7,gap:12}}>
            {[[fmt(metrics.r,3),'|r|','signal magnitude',c.fg],[fmt(metrics.tau,3),'τ',state.tauMode+' threshold',null],[fmt(metrics.EV,3),'EV','expected value',metrics.EV>0?psvc.COMMIT.fg:psvc.TOXIC.fg],[Math.round(metrics.theta)+'°','θ','integrity angle',null],[Math.round(metrics.phi)+'°','Φ','coherence angle',null],[fmt(metrics.reversibility,2),'ρ','reversibility',null]].map(([v,l,sub,col])=>(
              <div key={l} style={{borderBottom:`1px solid ${psx.rule}`,paddingBottom:5}}>
                <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.14em',marginBottom:2}}>{l}</div>
                <div style={{font:`300 22px/1 ${psx.serif}`,color:col||psx.ink}}>{v}</div>
                <div style={{font:`italic 10px ${psx.serif}`,color:psx.dim,marginTop:2}}>{sub}</div>
              </div>
            ))}
          </div>
        </main>

        {/* RIGHT */}
        <aside style={{padding:'14px 18px',borderLeft:`1px solid ${psx.rule}`,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',marginBottom:5}}>§ 3 — BLOCH VECTOR</div>
          {[['r_x',metrics.r_x,'intent axis'],[' r_y',metrics.r_y,'risk axis'],['r_z',metrics.r_z,'integrity axis'],['|r|',metrics.r,'signal magnitude']].map(([l,v,sub])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',borderBottom:`1px solid ${psx.rule}`}}>
              <div style={{flex:1}}><div style={{font:`12px ${psx.mono}`,color:psx.ink}}>{l}</div><div style={{font:`italic 10px ${psx.serif}`,color:psx.dim}}>{sub}</div></div>
              <div style={{font:`12px ${psx.mono}`,color:psx.ink}}>{fmt(v,4)}</div>
            </div>
          ))}
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',margin:'10px 0 5px'}}>§ 4 — DERIVED</div>
          {[['Purity','Tr(ρ²)=½(1+|r|²)',metrics.purity],['Entropy','S(ρ)=−λ₊log₂λ₊−λ₋log₂λ₋',metrics.entropy],['Coherence','√(r_x²+r_y²)',metrics.coherence],['Integrity','Sp×St',metrics.integrity]].map(([l,sub,v])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 0',borderBottom:`1px solid ${psx.rule}`}}>
              <div style={{flex:1}}><div style={{font:`12.5px ${psx.serif}`,color:psx.ink}}>{l}</div><div style={{font:`9.5px ${psx.mono}`,color:psx.faint}}>{sub}</div></div>
              <div style={{width:60,height:4,background:psx.rule,position:'relative'}}><div style={{position:'absolute',left:0,top:0,bottom:0,width:`${v*100}%`,background:psx.ink}}/></div>
              <div style={{width:30,textAlign:'right',font:`11px ${psx.mono}`,color:psx.ink}}>{fmt(v,2)}</div>
            </div>
          ))}
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',margin:'10px 0 5px'}}>§ 5 — SENSITIVITY</div>
          <div style={{font:`italic 10.5px ${psx.serif}`,color:psx.dim,marginBottom:5}}>Perturb each ±0.10, hold others fixed.</div>
          {sensitivity.map(s=>(
            <div key={s.key} style={{display:'grid',gridTemplateColumns:'20px 1fr 1fr',alignItems:'center',padding:'3px 0',borderBottom:`1px dotted ${psx.rule}`,font:`12px ${psx.serif}`}}>
              <em style={{color:psx.accent}}>{s.key}</em>
              <span style={{color:s.flipDn?psvc[s.flipDn].fg:psx.faint,fontStyle:s.flipDn?'normal':'italic'}}>{s.flipDn?`↓ ${s.flipDn.toLowerCase()}`:'no flip ↓'}</span>
              <span style={{color:s.flipUp?psvc[s.flipUp].fg:psx.faint,fontStyle:s.flipUp?'normal':'italic',textAlign:'right'}}>{s.flipUp?`${s.flipUp.toLowerCase()} ↑`:'↑ no flip'}</span>
            </div>
          ))}
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',margin:'10px 0 5px'}}>§ 6 — VALIDATION</div>
          {Object.entries(metrics.validation).map(([k,v])=>(
            <div key={k} style={{font:`10px/1.6 ${psx.mono}`,color:v?psvc.COMMIT.fg:psvc.TOXIC.fg}}>{v?'✓':'✗'} {k.replace(/_/g,' ')}</div>
          ))}
        </aside>
      </div>
    </div>
  );
}

// VIEW D — BRUTALIST
// ═══════════════════════════════════════════════════════════
function BrutalistView() {
  const {state,update,applyPreset,parseScenario,parsing,metrics,sensitivity,factors,history,logs,api,presets} = useNerva();
  const brx={bg:'#f4f3ef',paper:'#ffffff',ink:'#0a0a0a',dim:'rgba(10,10,10,0.55)',faint:'rgba(10,10,10,0.30)',rule:'#0a0a0a',ruleL:'rgba(10,10,10,0.16)',signal:'#d92e16',mono:'"JetBrains Mono","IBM Plex Mono",monospace'};
  const isVeto=metrics.verdict==='TOXIC'||metrics.verdict==='ESCALATE';
  const vCol=isVeto?brx.signal:brx.ink;
  const vMark={COMMIT:'●',HOLD:'◑',WAIT:'○',ESCALATE:'△',TOXIC:'×'}[metrics.verdict];
  const bbar=(v,w=28)=>{const f=Math.round(v*w);return <span style={{fontFamily:brx.mono,fontSize:12,letterSpacing:'-0.05em',color:brx.ink}}>{'█'.repeat(f)}{'·'.repeat(w-f)}</span>;};

  const sec=(no,title,children,style={})=>(
    <section style={{display:'flex',flexDirection:'column',minWidth:0,minHeight:0,...style}}>
      <div style={{display:'flex',alignItems:'baseline',gap:8,padding:'3px 0 5px',borderBottom:`2px solid ${brx.ink}`}}>
        <span style={{font:`700 12px/1 ${brx.mono}`,color:brx.ink}}>§{String(no).padStart(2,'0')}</span>
        <span style={{font:`700 11px/1 ${brx.mono}`,color:brx.ink,letterSpacing:'0.16em'}}>{title}</span>
      </div>
      <div style={{paddingTop:8,flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>{children}</div>
    </section>
  );

  return (
    <div style={{width:'100%',height:'100%',background:brx.bg,color:brx.ink,fontFamily:brx.mono,overflow:'hidden',display:'grid',gridTemplateRows:'auto 1fr auto'}}>
      {/* header slab */}
      <header style={{background:brx.ink,color:brx.bg,padding:'7px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'baseline',gap:14,fontSize:11,letterSpacing:'0.14em'}}>
          <span style={{fontWeight:700,fontSize:14,letterSpacing:'0.32em'}}>NERVA</span>
          <span style={{opacity:0.6}}>v10.0</span>
          <span style={{opacity:0.4}}>·</span>
          <span style={{opacity:0.8}}>BRUTALIST EDITION</span>
          <span style={{opacity:0.4}}>·</span>
          <span style={{opacity:0.6}}>BLOCH SPHERE KERNEL</span>
        </div>
        <div style={{display:'flex',gap:16,fontSize:11,letterSpacing:'0.1em',opacity:0.8}}>
          <span>SES 7F-2A91</span><span>{api.region.toUpperCase()}</span><span>{Math.round(api.latency)}MS</span>
        </div>
      </header>

      {/* 4-col body */}
      <div style={{display:'grid',gridTemplateColumns:'250px 1fr 1fr 240px',minHeight:0,background:brx.bg,overflow:'hidden'}}>
        {/* COL 1 */}
        <div style={{padding:'12px 14px',borderRight:`1px solid ${brx.ink}`,overflow:'hidden',display:'flex',flexDirection:'column',gap:14,minHeight:0}}>
          {sec(1,'SCENARIO',
            <>
              <textarea value={state.scenario} onChange={e=>update({scenario:e.target.value})} style={{background:brx.paper,color:brx.ink,border:`1px solid ${brx.ink}`,font:`11px/1.45 ${brx.mono}`,padding:5,height:75,marginBottom:6}}/>
              <button onClick={()=>parseScenario(state.scenario)} disabled={parsing} style={{background:parsing?brx.bg:brx.ink,color:parsing?brx.ink:brx.bg,border:`2px solid ${brx.ink}`,font:`700 11px/1 ${brx.mono}`,letterSpacing:'0.1em',padding:'6px 0',marginBottom:8,width:'100%'}}>
                {parsing?'PARSING…':'⚡ PARSE WITH AI'}
              </button>
              <div style={{font:`10px ${brx.mono}`,color:brx.dim,letterSpacing:'0.16em',marginBottom:3}}>CASE LIBRARY</div>
              <div style={{display:'flex',flexDirection:'column',border:`1px solid ${brx.ink}`}}>
                {presets.map((p,i)=>(
                  <button key={p.id} onClick={()=>applyPreset(p.id)} style={{background:state.activePreset===p.id?brx.ink:brx.paper,color:state.activePreset===p.id?brx.bg:brx.ink,border:'none',borderTop:i>0?`1px solid ${brx.ink}`:'none',font:`700 11px/1 ${brx.mono}`,letterSpacing:'0.08em',padding:'5px 7px',cursor:'pointer',textAlign:'left',display:'flex',justifyContent:'space-between'}}>
                    <span>{p.name.toUpperCase()}</span><span style={{opacity:0.5,fontWeight:400}}>{p.id}</span>
                  </button>
                ))}
              </div>
            </>
          )}
          {sec(2,'PARAMETERS',
            <>
              {[['E','URGENCY',state.E,v=>update({E:v})],['S','STRATEGY',state.S,v=>update({S:v})],['R','RISK',state.R,v=>update({R:v})],['Sp','SUPPORT',state.Sp,v=>update({Sp:v})],['St','STABILITY',state.St,v=>update({St:v})]].map(([sym,lbl,val,set])=>(
                <div key={sym} style={{marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between'}}><span style={{font:`700 11px ${brx.mono}`,letterSpacing:'0.08em'}}>{sym} · {lbl}</span><span style={{font:`700 12px ${brx.mono}`}}>{fmt(val,2)}</span></div>
                  <div>{bbar(val)}</div>
                  <input type="range" min="0" max="1" step="0.01" value={val} onChange={e=>set(parseFloat(e.target.value))} style={{accentColor:brx.ink,color:brx.ink,width:'100%',height:2,marginTop:1}}/>
                </div>
              ))}
              <div style={{marginTop:4}}>
                <div style={{font:`700 11px ${brx.mono}`,letterSpacing:'0.08em',marginBottom:4}}>τ · THRESHOLD</div>
                <div style={{display:'flex',border:`1px solid ${brx.ink}`}}>
                  {['auto','manual'].map(m=><button key={m} onClick={()=>update({tauMode:m})} style={{flex:1,background:state.tauMode===m?brx.ink:brx.paper,color:state.tauMode===m?brx.bg:brx.ink,border:'none',font:`700 11px ${brx.mono}`,letterSpacing:'0.12em',padding:'4px 0',cursor:'pointer'}}>{m.toUpperCase()}</button>)}
                </div>
                {state.tauMode==='manual'?<><div style={{marginTop:4}}>{bbar(state.tauManual)}</div><input type="range" min="0.15" max="0.85" step="0.01" value={state.tauManual} onChange={e=>update({tauManual:parseFloat(e.target.value)})} style={{accentColor:brx.ink,color:brx.ink,width:'100%',marginTop:2}}/><div style={{font:`11px ${brx.mono}`,color:brx.dim}}>τ = {fmt(state.tauManual,3)}</div></>
                :<div style={{marginTop:4,font:`10px/1.4 ${brx.mono}`,color:brx.dim}}>τ = 0.25+0.35·S(ρ)+0.25·R−0.15·rev<br/>= {fmt(metrics.tauAuto,4)}</div>}
              </div>
            </>
          )}
        </div>

        {/* COL 2+3 — verdict hero */}
        <div style={{gridColumn:'span 2',padding:'12px 20px',overflow:'hidden',display:'grid',gridTemplateRows:'auto auto 1fr auto',gap:12,minHeight:0,borderRight:`1px solid ${brx.ink}`}}>
          {/* massive verdict */}
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:16,alignItems:'start'}}>
            <div style={{border:`3px solid ${vCol}`,padding:'5px 14px 10px',textAlign:'left'}}>
              <div style={{font:`700 10px ${brx.mono}`,letterSpacing:'0.18em',color:brx.dim}}>VERDICT N° 1</div>
              <div style={{font:`900 72px/0.9 ${brx.mono}`,color:vCol,letterSpacing:'-0.04em',marginTop:2}}>{metrics.verdict}</div>
              <div style={{font:`700 10px ${brx.mono}`,letterSpacing:'0.22em',color:vCol,marginTop:3}}>{vMark} {isVeto?'HARD VETO':metrics.verdict==='COMMIT'?'PROCEED':metrics.verdict==='HOLD'?'RECHECK':metrics.verdict==='WAIT'?'INSUFFICIENT':'ROUTE HUMAN'}</div>
            </div>
            <div style={{paddingTop:2}}>
              <div style={{font:`12.5px/1.55 ${brx.mono}`,color:brx.ink,textTransform:'uppercase',letterSpacing:'0.01em',marginBottom:10}}>{metrics.reason}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',borderTop:`2px solid ${brx.ink}`,borderBottom:`2px solid ${brx.ink}`}}>
                {[['|r|',fmt(metrics.r,3)],['τ',fmt(metrics.tau,3)],['EV',fmt(metrics.EV,3)],['Θ°',Math.round(metrics.theta)],['ρ',fmt(metrics.reversibility,2)]].map(([l,v],i,arr)=>(
                  <div key={l} style={{padding:'5px 8px',borderRight:i<arr.length-1?`1px solid ${brx.ink}`:'none'}}>
                    <div style={{font:`9px ${brx.mono}`,color:brx.dim,letterSpacing:'0.16em'}}>{l}</div>

                  </div>
                ))}
              </div>
              {/* validation strip */}
              <div style={{display:'flex',gap:12,marginTop:6,font:`9.5px ${brx.mono}`}}>
                {Object.entries(metrics.validation).map(([k,v])=>(
                  <span key={k} style={{color:v?'#2a7a2a':brx.signal}}>{v?'✓':'✗'} {k.split('_')[0]}</span>
                ))}
              </div>
            </div>
          </div>

          {sec(3,'QUALITY',
            <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',columnGap:20,rowGap:4}}>
              {[['INTEGRITY',metrics.integrity],['COHERENCE',metrics.coherence],['PURITY',metrics.purity],['ENTROPY',metrics.entropy],['REVERSIBLE',metrics.reversibility],['EXP-VALUE',(metrics.EV+1)/2]].map(([l,v])=>(
                <div key={l} style={{display:'grid',gridTemplateColumns:'88px 1fr 38px',gap:5,alignItems:'center'}}>
                  <span style={{font:`700 10.5px ${brx.mono}`}}>{l}</span>
                  <span>{bbar(v,18)}</span>
                  <span style={{font:`12px ${brx.mono}`,textAlign:'right'}}>{fmt(v,2)}</span>
                </div>
              ))}
            </div>
          )}

          {sec(4,'DECISION SPACE',
            <div style={{display:'grid',gridTemplateColumns:'1fr 180px',gap:14,flex:1,minHeight:0}}>
              {/* custom brutalist phase map */}
              <svg viewBox="0 0 380 260" preserveAspectRatio="xMidYMid meet" style={{width:'100%',height:'100%',display:'block'}}>
                <defs><pattern id="brhatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke={brx.ink} strokeWidth="0.6"/></pattern></defs>
                {[{x0:0,y0:0,w:380,h:91,n:'COMMIT'},{x0:0,y0:91,w:190,h:78,n:'HOLD'},{x0:190,y0:91,w:190,h:78,n:'ESC'},{x0:0,y0:169,w:190,h:91,n:'ESC'},{x0:190,y0:169,w:190,h:91,n:'TOXIC'}].map((z,i)=>(
                  <g key={i}>
                    <rect x={z.x0} y={z.y0} width={z.w} height={z.h} fill={i===4?'url(#brhatch)':brx.ink} opacity={i===4?0.15:0.04}/>
                    <text x={z.x0+z.w/2} y={z.y0+z.h/2+4} textAnchor="middle" style={{font:`700 10px ${brx.mono}`,fill:brx.ink,letterSpacing:'0.18em',opacity:0.6}}>{z.n}</text>
                  </g>
                ))}
                <rect x={0} y={0} width={380} height={260} fill="none" stroke={brx.ink} strokeWidth="1.5"/>
                {[0.25,0.5,0.75].map(t=><g key={t}><line x1={t*380} y1={0} x2={t*380} y2={260} stroke={brx.ruleL}/><line x1={0} y1={t*260} x2={380} y2={t*260} stroke={brx.ruleL}/></g>)}
                <line x1={0} y1={91} x2={380} y2={91} stroke={brx.ink} strokeWidth="1"/>
                <line x1={0} y1={169} x2={380} y2={169} stroke={brx.ink} strokeWidth="1"/>
                <line x1={190} y1={91} x2={190} y2={260} stroke={brx.ink} strokeWidth="1"/>
                {/* τ line */}
                <line x1={0} y1={(1-metrics.tau)*260} x2={380} y2={(1-metrics.tau)*260} stroke={isVeto?brx.signal:brx.ink} strokeDasharray="4 3" strokeWidth="1.2"/>
                {/* history trail */}
                {history.map((h,i)=><circle key={i} cx={h.E*380} cy={(1-h.integrity)*260} r="2" fill={brx.ink} opacity={0.3+i*0.08}/>)}
                <polyline points={history.map(h=>`${h.E*380},${(1-h.integrity)*260}`).concat([`${state.E*380},${(1-metrics.integrity)*260}`]).join(' ')} fill="none" stroke={brx.ink} strokeWidth="0.7" strokeDasharray="3 2" opacity="0.5"/>
                {/* current point */}
                {(()=>{const px=state.E*380,py=(1-metrics.integrity)*260,col=isVeto?brx.signal:brx.ink;return(<><line x1={0} y1={py} x2={380} y2={py} stroke={col} strokeDasharray="2 3"/><line x1={px} y1={0} x2={px} y2={260} stroke={col} strokeDasharray="2 3"/><rect x={px-7} y={py-7} width="14" height="14" fill="none" stroke={col} strokeWidth="1.5"/><circle cx={px} cy={py} r="3" fill={col}/><text x={px+12} y={py-10} style={{font:`700 10.5px ${brx.mono}`,fill:col}}>({fmt(state.E,2)},{fmt(metrics.integrity,2)})</text></>);})()}
                {[0,0.5,1].map(t=><g key={t}><text x={t*380} y={260+14} textAnchor="middle" style={{font:`9px ${brx.mono}`,fill:brx.dim}}>{t.toFixed(1)}</text><text x={-4} y={(1-t)*260+3} textAnchor="end" style={{font:`9px ${brx.mono}`,fill:brx.dim}}>{t.toFixed(1)}</text></g>)}
              </svg>
              <div style={{display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
                <div>
                  <div style={{font:`700 10px ${brx.mono}`,letterSpacing:'0.16em',color:brx.dim,marginBottom:3}}>LEGEND</div>
                  <div style={{font:`11px/1.7 ${brx.mono}`}}>X · URGENCY (E)<br/>Y · INTEGRITY<br/>□ · CURRENT<br/>· · HISTORY ({history.length})<br/>— · τ threshold</div>
                </div>
                <div>
                  <div style={{font:`700 10px ${brx.mono}`,letterSpacing:'0.16em',color:brx.dim,marginBottom:3}}>BLOCH r</div>
                  <div style={{font:`11px/1.5 ${brx.mono}`}}>x {fmt(metrics.r_x,4)}<br/>y {fmt(metrics.r_y,4)}<br/>z {fmt(metrics.r_z,4)}<br/>|r| {fmt(metrics.r,4)}</div>
                </div>
                <div>
                  <div style={{font:`700 10px ${brx.mono}`,letterSpacing:'0.16em',color:brx.dim,marginBottom:3}}>TO COMMIT</div>
                  <div style={{font:`11px/1.5 ${brx.mono}`,color:brx.dim}}>
                    {metrics.integrity>=0.6&&metrics.EV>0.1?'already cleared':`+${fmt(Math.max(0,0.6-metrics.integrity),2)} integrity`}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>

        {/* COL 4 */}
        <div style={{padding:'12px 14px',overflow:'hidden',display:'flex',flexDirection:'column',gap:14,minHeight:0}}>
          {sec(5,'FACTORS',
            factors.map(f=>{
              const pos=f.weight>=0, mag=Math.min(9,Math.round(Math.abs(f.weight)*(9/0.3)));
              const bar3=pos?'·'.repeat(9)+'+'+'█'.repeat(mag)+'·'.repeat(9-mag):'·'.repeat(9-mag)+'█'.repeat(mag)+'-'+'·'.repeat(9);
              return (
                <div key={f.key} style={{display:'grid',gridTemplateColumns:'62px 1fr 40px',gap:3,alignItems:'center',font:`10.5px/1.5 ${brx.mono}`}}>
                  <span style={{fontWeight:700}}>{f.label.toUpperCase().slice(0,7)}</span>
                  <span style={{color:pos?brx.ink:brx.signal,letterSpacing:'-0.06em'}}>{bar3}</span>
                  <span style={{textAlign:'right',color:pos?brx.ink:brx.signal}}>{pos?'+':''}{fmt(f.weight,2)}</span>
                </div>
              );
            })
          )}
          {sec(6,'SENSITIVITY',
            <>
              <div style={{font:`10px/1 ${brx.mono}`,color:brx.dim,marginBottom:4}}>δ = ±0.10 · what flips</div>
              {sensitivity.map(s=>(
                <div key={s.key} style={{display:'grid',gridTemplateColumns:'20px 1fr 1fr',alignItems:'center',font:`10.5px/1.5 ${brx.mono}`}}>
                  <span style={{fontWeight:700}}>{s.key}</span>
                  <span style={{color:s.flipDn?brx.signal:brx.dim}}>{s.flipDn?`◀ ${s.flipDn.slice(0,4)}`:'— stable'}</span>
                  <span style={{color:s.flipUp?brx.signal:brx.dim,textAlign:'right'}}>{s.flipUp?`${s.flipUp.slice(0,4)} ▶`:'stable —'}</span>
                </div>
              ))}
            </>
          )}
          {sec(7,'LOG',
            <div style={{display:'flex',flexDirection:'column',font:`10px/1.45 ${brx.mono}`,color:brx.dim,overflow:'hidden'}}>
              {logs.map((l,i)=>{
                const sc=l.sev==='E'?brx.signal:l.sev==='W'?'#a07010':brx.dim;
                return <div key={i} style={{display:'grid',gridTemplateColumns:'10px 44px 1fr',gap:4}}><span style={{color:sc}}>{l.sev}</span><span style={{color:brx.ink}}>{l.src}</span><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.msg}</span></div>;
              })}
            </div>
          )}
          {sec(8,'HISTORY',
            <div style={{display:'flex',flexDirection:'column',font:`10.5px/1.5 ${brx.mono}`}}>
              {history.slice().reverse().map((h,i)=>{
                const isBad=h.verdict==='TOXIC'||h.verdict==='ESCALATE';
                const mins=Math.round((Date.now()-h.t)/60000);
                return (
                  <div key={i} style={{display:'grid',gridTemplateColumns:'28px 70px 36px 1fr',gap:5,borderBottom:`1px solid ${brx.ruleL}`,padding:'2px 0'}}>
                    <span style={{color:brx.dim}}>{mins}m</span>
                    <span style={{fontWeight:700}}>{h.label.slice(0,8)}</span>
                    <span style={{color:brx.dim,textAlign:'right'}}>{fmt(h.r,2)}</span>
                    <span style={{color:isBad?brx.signal:brx.ink,fontWeight:700,textAlign:'right'}}>{h.verdict}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* footer slab */}
      <div style={{background:brx.ink,color:brx.bg,padding:'5px 16px',display:'flex',justifyContent:'space-between',font:`700 10px ${brx.mono}`,letterSpacing:'0.14em'}}>
        <span>NERVA · BLOCH SPHERE KERNEL · v10.0 · AMDG</span>
        <span>● LIVE · {metrics.verdict} · |r|={fmt(metrics.r,3)} · τ={fmt(metrics.tau,3)} · ρ={fmt(metrics.purity,4)}</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// ROOT + NAV CONTROLLER
// ═══════════════════════════════════════════════════════════
const VIEWS = {
  cockpit:   CockpitView,
  bloomberg: BloombergView,
  phase:     PhaseSpaceView,
  brutalist: BrutalistView,
};

function App() {
  const [view, setView] = useState('cockpit');
  useEffect(() => {
    document.querySelectorAll('.nav-tab').forEach(t => {
      t.addEventListener('click', () => {
        setView(t.dataset.view);
        document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
      });
    });
  }, []);
  const View = VIEWS[view];
  return (
    <NervaProvider>
      <div style={{width:'100%',height:'100%'}}>
        <View/>
      </div>
    </NervaProvider>
  );
}

ReactDOM.createRoot(document.getElementById('view-root')).render(<App/>);
</script>
</body>
</html>
