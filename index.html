<script type="text/babel" data-presets="env,react">
const {createContext,useContext,useState,useMemo,useCallback,useEffect,useRef} = React;
const clamp=(v,lo=0,hi=1)=>Math.max(lo,Math.min(hi,v));
const fmt=(n,d=2)=>(n==null||isNaN(n))?'—':Number(n).toFixed(d);

// ── REAL BLOCH SPHERE KERNEL (v8.3.2) ────────────────────
function vonNeumannEntropy(r){
  if(r>=0.9999)return 0;if(r<=0.0001)return 1;
  const lp=(1+r)/2,lm=(1-r)/2;
  return -lp*Math.log2(lp)-lm*Math.log2(lm);
}
function computeMetrics(state){
  const{E,S,R,Sp,St,tauMode,tauManual}=state;
  const r_max=Math.sqrt(3);
  const r_x=(E+S)/2/r_max, r_y=R/r_max, r_z=(Sp*St)/r_max;
  const r=Math.sqrt(r_x*r_x+r_y*r_y+r_z*r_z);
  const theta=r>0?Math.acos(clamp(r_z/r,-1,1))*(180/Math.PI):0;
  const phi=Math.atan2(r_y,r_x)*(180/Math.PI);
  const entropy=vonNeumannEntropy(r);
  const purity=0.5*(1+r*r);
  const coherence=Math.sqrt(r_x*r_x+r_y*r_y);
  const integrity=Sp*St;
  const reversibility=clamp((Sp+St)/2);
  const EV=Sp-R;
  const tauAuto=clamp(0.25+0.35*entropy+0.25*R-0.15*reversibility,0.15,0.85);
  const tau=tauMode==='manual'?clamp(tauManual,0.15,0.85):tauAuto;
  const signal=r>=tau;
  const oneWayDoor=reversibility<0.4;
  const validation={
    bloch_magnitude_valid:r<=1.0001,
    purity_range_valid:purity>=0.4999&&purity<=1.0001,
    entropy_range_valid:entropy>=0&&entropy<=1.0001,
    components_consistent:Math.abs(r-Math.sqrt(r_x*r_x+r_y*r_y+r_z*r_z))<0.0001
  };
  let verdict,reason;
  if(!signal){
    if(E>=0.75&&oneWayDoor){verdict='ESCALATE';reason='[EMERGENCY OVERRIDE] High urgency + irreversible. Cannot wait — routing to human immediately.';}
    else{verdict='WAIT';reason=`Insufficient signal. |r|=${fmt(r,3)} < τ=${fmt(tau,3)}. Gather more data.`;}
  } else if(integrity<0.22||(R>0.75&&integrity<0.35)){
    verdict='TOXIC';reason=`Hard veto. Integrity=${fmt(integrity,2)}, Risk=${fmt(R,2)}. Autonomous action prohibited.`;
  } else if(oneWayDoor&&integrity<0.55){
    verdict='ESCALATE';reason=`One-Way Brake. Irreversible (rev=${fmt(reversibility,2)}) with weak foundation (I=${fmt(integrity,2)}).`;
  } else if(EV<0){
    verdict=integrity>=0.4?'HOLD':'ESCALATE';
    reason=`EV Block. Negative expected value (EV=${fmt(EV,2)}) suppresses commit.`;
  } else if(integrity>=0.6&&EV>0.1){
    verdict='COMMIT';reason=`Strong foundation (I=${fmt(integrity,2)}), positive EV (${fmt(EV,2)}). Proceed with monitoring.`;
  } else if(integrity>=0.4){
    verdict='HOLD';reason=`Medium foundation (I=${fmt(integrity,2)}). EV=${fmt(EV,2)}. Recheck in next window.`;
  } else {
    verdict='ESCALATE';reason=`Signal cleared but integrity (${fmt(integrity,2)}) below autonomous-act floor. Route to human.`;
  }
  return{r,r_x,r_y,r_z,theta,phi,entropy,purity,coherence,integrity,reversibility,EV,tau,tauAuto,signal,oneWayDoor,verdict,reason,validation};
}

const PRESETS=[
  {id:'drone',name:'Drone ROE',subtitle:'Uncertain intel · civilian zone',desc:'Autonomous strike drone identifies target matching ROE profile at 91% confidence. Two civilians within 30m radius. Intel age: 4 minutes. Comms with ground partially degraded.',state:{E:0.74,S:0.61,R:0.78,Sp:0.42,St:0.46}},
  {id:'hft',name:'HFT Trade',subtitle:'Volatile market',desc:'Strategy detects 47bp dislocation in cross-listed equity pair. Volume regime shifted in last 8s. Risk budget 62% consumed today. Reversibility window: 90 seconds.',state:{E:0.81,S:0.92,R:0.39,Sp:0.78,St:0.61}},
  {id:'av',name:'AV Lane',subtitle:'Pedestrian near',desc:'L4 vehicle, 38mph, lane-change opportunity to bypass stalled truck. Pedestrian on adjacent sidewalk, no indication of crossing. Sensor confidence 0.94.',state:{E:0.52,S:0.83,R:0.31,Sp:0.86,St:0.74}},
  {id:'surgical',name:'Surgical',subtitle:'Patient anomaly',desc:'Robotic surgical assist detects unexpected vascular structure 4mm off planned trajectory. Continuing has 0.12 complication risk. Pause adds 90s.',state:{E:0.68,S:0.71,R:0.66,Sp:0.58,St:0.55}},
  {id:'ad',name:'Ad Buy',subtitle:'AI-owned process',desc:'Agency partner has automated the ad-buy validity step. New offering only dictates buy validity; rest of process is AI-owned. Reversibility limited by 24h commitment window.',state:{E:0.59,S:0.98,R:0.42,Sp:0.51,St:0.52}},
  {id:'launch',name:'Launch Hold',subtitle:'Pad anomaly · T-90s',desc:'Sensor 4B reading 2.1σ outside nominal on LOX temp. Other sensors nominal. Weather window closes in 9 minutes. Scrub cost: $4.2M and 11-day delay.',state:{E:0.88,S:0.79,R:0.62,Sp:0.55,St:0.49}},
];

const VC={
  COMMIT:{fg:'#3ddc97',bg:'rgba(61,220,151,0.10)'},
  HOLD:{fg:'#f5b942',bg:'rgba(245,185,66,0.10)'},
  WAIT:{fg:'#7aa7ff',bg:'rgba(122,167,255,0.10)'},
  ESCALATE:{fg:'#ff8c42',bg:'rgba(255,140,66,0.12)'},
  TOXIC:{fg:'#ff5c6c',bg:'rgba(255,92,108,0.12)'},
};

const NervaCtx=createContext(null);
function seedHistory(){
  const seeds=[
    {E:0.32,S:0.71,R:0.22,Sp:0.78,St:0.84,label:'DRN-04412'},
    {E:0.81,S:0.92,R:0.39,Sp:0.78,St:0.61,label:'HFT-09921'},
    {E:0.68,S:0.55,R:0.71,Sp:0.41,St:0.38,label:'DRN-04413'},
    {E:0.52,S:0.83,R:0.31,Sp:0.86,St:0.74,label:'AVL-77108'},
    {E:0.59,S:0.98,R:0.42,Sp:0.51,St:0.52,label:'ADV-30022'},
  ];
  const base=Date.now();
  return seeds.map((s,i)=>{const m=computeMetrics({...s,tauMode:'auto',tauManual:0.25});return{...s,...m,t:base-(5-i)*240000};});
}

function NervaProvider({children}){
  const[state,setState]=useState({E:0.59,S:0.98,R:0.42,Sp:0.51,St:0.52,tauMode:'auto',tauManual:0.25,scenario:PRESETS[4].desc,activePreset:'ad'});
  const[history]=useState(seedHistory);
  const[parsing,setParsing]=useState(false);
  const[api,setApi]=useState({latency:84,region:'us-west-2',model:'nerva-bloch-v10',status:'nominal',uptime:99.982});
  useEffect(()=>{const id=setInterval(()=>setApi(a=>({...a,latency:clamp(a.latency+(Math.random()-0.5)*14,55,190)})),2400);return()=>clearInterval(id);},[]);
  const metrics=useMemo(()=>computeMetrics(state),[state]);
  useEffect(()=>{
    const vEl=document.getElementById('nav-verdict'),rEl=document.getElementById('nav-r'),tEl=document.getElementById('nav-tau');
    if(vEl){vEl.textContent=metrics.verdict;vEl.style.color=VC[metrics.verdict]?.fg||'#fff';}
    if(rEl)rEl.textContent=`|r|=${fmt(metrics.r,3)}`;
    if(tEl)tEl.textContent=`τ=${fmt(metrics.tau,3)}`;
    // update live values on API page if visible
    ['lv-r','lv-tau','lv-entropy','lv-purity','lv-integrity','lv-ev','lv-verdict','lv-rx','lv-ry','lv-rz'].forEach(id=>{
      const el=document.getElementById(id);
      if(!el)return;
      const map={'lv-r':fmt(metrics.r,4),'lv-tau':fmt(metrics.tau,4),'lv-entropy':fmt(metrics.entropy,4),'lv-purity':fmt(metrics.purity,4),'lv-integrity':fmt(metrics.integrity,4),'lv-ev':fmt(metrics.EV,3),'lv-verdict':metrics.verdict,'lv-rx':fmt(metrics.r_x,4),'lv-ry':fmt(metrics.r_y,4),'lv-rz':fmt(metrics.r_z,4)};
      el.textContent=map[id]||'—';
    });
  },[metrics]);
  const update=useCallback(patch=>setState(s=>({...s,...patch})),[]);
  const applyPreset=useCallback(id=>{const p=PRESETS.find(x=>x.id===id);if(p)setState(s=>({...s,...p.state,scenario:p.desc,activePreset:id}));},[]);

  // Parser — calls /api/parse on Vercel
  const parseScenario=useCallback(async(text)=>{
    if(!text.trim())return;
    setParsing(true);
    try{
      const res=await fetch('/api/parse',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({scenario:text})});
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const parsed=await res.json();
      const patch={};
      ['E','S','R','Sp','St'].forEach(k=>{if(parsed[k]!==undefined)patch[k]=clamp(parseFloat(parsed[k]));});
      setState(s=>({...s,...patch,activePreset:''}));
    }catch(e){console.warn('Parse error:',e);alert('AI parsing unavailable. Check that api/parse.js is deployed.');}
    finally{setParsing(false);}
  },[]);

  const sensitivity=useMemo(()=>['E','S','R','Sp','St'].map(k=>{
    const up=computeMetrics({...state,[k]:clamp(state[k]+0.1)});
    const dn=computeMetrics({...state,[k]:clamp(state[k]-0.1)});
    const base=metrics;
    return{key:k,dUp:(up.r-up.tau)-(base.r-base.tau),dDn:(dn.r-dn.tau)-(base.r-base.tau),flipUp:up.verdict!==base.verdict?up.verdict:null,flipDn:dn.verdict!==base.verdict?dn.verdict:null};
  }),[state,metrics]);

  const factors=useMemo(()=>{
    const{E,S,R,Sp,St}=state;
    return[
      {key:'S',label:'Strategy',weight:0.40*S-0.20,raw:S},
      {key:'Sp',label:'Support',weight:0.35*Sp-0.175,raw:Sp},
      {key:'St',label:'Stability',weight:0.25*St-0.125,raw:St},
      {key:'R',label:'Risk',weight:-0.25*R,raw:R},
      {key:'E',label:'Urgency',weight:-0.12*E*(1-S),raw:E},
    ];
  },[state]);

  const forecast=useMemo(()=>{
    const hz=[{label:'T+1m',minutes:1},{label:'T+5m',minutes:5},{label:'T+15m',minutes:15},{label:'T+1h',minutes:60}];
    const all=[...history.map(h=>({t:h.t,r:h.r})),{t:Date.now(),r:metrics.r}];
    const t0=all[0].t;
    const xs=all.map(p=>(p.t-t0)/60000),ys=all.map(p=>p.r);
    const n=xs.length,mX=xs.reduce((a,b)=>a+b,0)/n,mY=ys.reduce((a,b)=>a+b,0)/n;
    let num=0,den=0;xs.forEach((x,i)=>{num+=(x-mX)*(ys[i]-mY);den+=(x-mX)**2;});
    const slope=den===0?0:num/den,HL=25;
    const points=hz.map(h=>{
      const damp=Math.exp(-h.minutes/HL),r=clamp(metrics.r+slope*h.minutes*damp);
      const sigma=clamp(0.035+0.022*Math.sqrt(h.minutes)+0.12*metrics.entropy*Math.sqrt(h.minutes/30),0,0.5);
      const z=(metrics.tau-r)/Math.max(0.01,sigma),cdf=0.5*(1+Math.sign(-z)*Math.sqrt(1-Math.exp(-2*z*z/Math.PI)));
      let pv;if(r<metrics.tau)pv='WAIT';else if(metrics.integrity<0.4)pv='ESCALATE';else if(metrics.EV>0.1&&metrics.integrity>0.6)pv='COMMIT';else pv='HOLD';
      return{...h,r,sigma,lo:clamp(r-sigma),hi:clamp(r+sigma),pAbove:clamp(1-cdf),predVerdict:pv};
    });
    let window;
    if(Math.abs(slope)<0.002)window=metrics.r>=metrics.tau?'ACT NOW — signal stable above τ':'HOLD — signal stable below τ';
    else if(slope>0){if(metrics.r>=metrics.tau)window='ACT NOW — signal strengthening';else{const need=(metrics.tau-metrics.r)/slope;window=need>60?'WAIT — unlikely to clear τ within 1h':`WAIT — likely to clear τ in ~${Math.max(1,Math.round(need))}m`;}}
    else{if(metrics.r>=metrics.tau){const fade=(metrics.r-metrics.tau)/Math.abs(slope);window=fade>60?'ACT THIS HOUR — stable for now':`ACT WITHIN ~${Math.max(1,Math.round(fade))}m — signal decaying`;}else window='HOLD — signal decaying below τ';}
    return{slope,points,window,histR:ys};
  },[history,metrics,state]);

  const logs=useMemo(()=>[
    {sev:'I',src:'parse',msg:`scenario tokens=${Math.floor(state.scenario.length/4)} model=nerva-bloch-v10`},
    {sev:'I',src:'extract',msg:`E=${fmt(state.E,2)} S=${fmt(state.S,2)} R=${fmt(state.R,2)} Sp=${fmt(state.Sp,2)} St=${fmt(state.St,2)}`},
    {sev:metrics.oneWayDoor?'W':'I',src:'brake',msg:`reversibility=${fmt(metrics.reversibility,2)} ${metrics.oneWayDoor?'ONE-WAY ARMED':'disarmed'}`},
    {sev:'I',src:'bloch',msg:`r=( ${fmt(metrics.r_x,4)}, ${fmt(metrics.r_y,4)}, ${fmt(metrics.r_z,4)} )`},
    {sev:'I',src:'compute',msg:`|r|=${fmt(metrics.r,4)} τ=${fmt(metrics.tau,4)} S(ρ)=${fmt(metrics.entropy,4)}`},
    {sev:metrics.verdict==='TOXIC'||metrics.verdict==='ESCALATE'?'E':'I',src:'verdict',msg:`${metrics.verdict} · purity=${fmt(metrics.purity,4)}`},
    {sev:'I',src:'audit',msg:`components_consistent=${metrics.validation.components_consistent}`},
    {sev:'I',src:'route',msg:metrics.verdict==='ESCALATE'||metrics.verdict==='TOXIC'?'human #decision-review-p0':'auto-dispatch ok'},
  ],[state,metrics]);

  const value={state,update,applyPreset,parseScenario,parsing,metrics,sensitivity,factors,forecast,history,logs,api,presets:PRESETS,VC};
  return React.createElement(NervaCtx.Provider,{value},children);
}

function Spark({values,w=80,h=18,stroke='currentColor'}){

  const pts=values.map((v,i)=>`${((i/(values.length-1))*w).toFixed(1)},${(h-((v-min)/rng)*h).toFixed(1)}`).join(' ');
  return <svg width={w} height={h} style={{display:'block',overflow:'visible'}}><polyline points={pts} fill="none" stroke={stroke} strokeWidth="1.3" strokeLinejoin="round" strokeLinecap="round"/></svg>;
}

    <div style={{background:'#0f1419',border:'1px solid rgba(255,255,255,0.06)',borderRadius:4,padding:'10px 12px',display:'flex',flexDirection:'column',...style}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
        <div style={{font:`500 9.5px/1 ${mono}`,letterSpacing:'0.14em',color:'rgba(216,221,230,0.5)',textTransform:'uppercase'}}>{title}</div>
        {hint&&<div style={{font:`9.5px/1 ${mono}`,color:'rgba(216,221,230,0.3)'}}>{hint}</div>}
      </div>
      <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column'}}>{children}</div>
    </div>
  );
  const rHist=history.map(h=>h.r).concat([metrics.r]);
  return(
    <div style={{width:'100%',height:'100%',background:'#0a0d12',color:'#d8dde6',fontFamily:sans,display:'grid',gridTemplateColumns:'280px 1fr 300px',gap:8,padding:8,overflow:'hidden'}}>
      {/* LEFT */}
      <div style={{display:'flex',flexDirection:'column',gap:8,overflow:'hidden'}}>
        {tile('Scenario',presets.find(p=>p.id===state.activePreset)?.name||'custom',<>
          <textarea value={state.scenario} onChange={e=>update({scenario:e.target.value})} style={{background:'transparent',color:'#d8dde6',font:`12px/1.45 ${sans}`,height:70,padding:0,marginBottom:8}}/>
          <button onClick={()=>parseScenario(state.scenario)} disabled={parsing} style={{background:parsing?'rgba(76,201,240,0.05)':'rgba(76,201,240,0.1)',border:`1px solid ${parsing?'rgba(76,201,240,0.2)':'rgba(76,201,240,0.4)'}`,color:parsing?'rgba(76,201,240,0.4)':'#4cc9f0',font:`600 10px/1 ${mono}`,letterSpacing:'0.12em',padding:'7px 0',marginBottom:8}}>
            {parsing?'⟳ PARSING...':'⚡ PARSE WITH AI'}
          </button>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
            {presets.map(p=><button key={p.id} onClick={()=>applyPreset(p.id)} style={{background:state.activePreset===p.id?'rgba(76,201,240,0.12)':'rgba(255,255,255,0.025)',border:`1px solid ${state.activePreset===p.id?'#4cc9f0':'rgba(255,255,255,0.06)'}`,color:'#d8dde6',font:`500 10px/1.2 ${sans}`,padding:'5px 7px',textAlign:'left',borderRadius:3}}>
              <div style={{color:state.activePreset===p.id?'#4cc9f0':'#d8dde6',fontSize:10.5}}>{p.name}</div>
              <div style={{font:`9px/1 ${mono}`,color:'rgba(216,221,230,0.35)',marginTop:2}}>{p.subtitle}</div>
            </button>)}
          </div>
        </>)}
        {tile('Parameters','LIVE',<div style={{display:'flex',flexDirection:'column',gap:11}}>
          <Slider sym="E" label="Urgency" sub="priority / pressure" value={state.E} onChange={v=>update({E:v})}/>
          <Slider sym="S" label="Strategy" sub="plan quality / coherence" value={state.S} onChange={v=>update({S:v})}/>
          <Slider sym="R" label="Risk" sub="exposure to neg. outcomes" value={state.R} onChange={v=>update({R:v})}/>
          <Slider sym="Sp" label="Support" sub="data confidence / evidence" value={state.Sp} onChange={v=>update({Sp:v})}/>
          <Slider sym="St" label="Stability" sub="system health / environment" value={state.St} onChange={v=>update({St:v})}/>
        </div>)}
        {tile('Threshold τ',state.tauMode==='auto'?'AUTO':'MANUAL',<>
          <div style={{display:'flex',gap:4,marginBottom:8}}>
            {['auto','manual'].map(m=><button key={m} onClick={()=>update({tauMode:m})} style={{flex:1,background:state.tauMode===m?'#4cc9f0':'transparent',color:state.tauMode===m?'#000':'#d8dde6',border:`1px solid ${state.tauMode===m?'#4cc9f0':'rgba(255,255,255,0.1)'}`,font:`500 10px/1 ${mono}`,letterSpacing:'0.12em',padding:'6px 0',borderRadius:3}}>{m.toUpperCase()}</button>)}
          </div>
          {state.tauMode==='manual'?<Slider sym="τ" label="Manual" value={state.tauManual} onChange={v=>update({tauManual:v})}/>:<div style={{font:`10px/1.4 ${mono}`,color:'rgba(216,221,230,0.4)'}}>τ = 0.25+0.35·S(ρ)+0.25·R−0.15·rev<br/>= {fmt(metrics.tauAuto,4)}</div>}
        </>)}
      </div>
      {/* CENTER */}
      <div style={{display:'grid',gridTemplateRows:'260px 1fr',gap:8,overflow:'hidden'}}>
        <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:8}}>
          {tile('Verdict','|r| vs τ',<CPGauge value={metrics.r} tau={metrics.tau} verdict={metrics.verdict}/>)}
          {tile('Foundation','quality',<div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:10,height:'100%'}}>
            {[['INT',metrics.integrity,'#3ddc97'],['COH',metrics.coherence,'#4cc9f0'],['PUR',metrics.purity,'#7aa7ff'],['REV',metrics.reversibility,'#c084fc'],['ENT',metrics.entropy,'#f5b942']].map(([l,v,col])=>(
              <div key={l} style={{display:'flex',flexDirection:'column',gap:5}}>
                <div style={{font:`9px/1 ${mono}`,color:'rgba(216,221,230,0.4)',letterSpacing:'0.14em'}}>{l}</div>
                <div style={{flex:1,position:'relative',background:'rgba(255,255,255,0.025)'}}><div style={{position:'absolute',left:0,right:0,bottom:0,height:`${v*100}%`,background:`linear-gradient(0deg,${col}66,${col})`,transition:'height 0.25s'}}/></div>
                <div style={{font:`500 12px/1 ${mono}`,color:'#d8dde6'}}>{fmt(v,2)}</div>
              </div>
            ))}
          </div>)}
        </div>
        {tile('Decision Zone Map',`E:${fmt(state.E,2)} · I:${fmt(metrics.integrity,2)} · |r|=${fmt(metrics.r,3)}`,
          <div style={{display:'grid',gridTemplateColumns:'1fr 260px',gap:12,flex:1,minHeight:0}}>
            <div style={{position:'relative',flex:1,minHeight:0}}>
              <PhaseMap metrics={metrics} state={state}/>
              {!metrics.signal&&<div style={{position:'absolute',bottom:6,left:6,right:6,background:'rgba(0,0,0,0.7)',border:`1px solid ${VC[metrics.verdict].fg}44`,borderRadius:3,padding:'5px 8px',font:`10px/1.3 ${mono}`,color:VC[metrics.verdict].fg}}>⏸ SIGNAL BELOW τ — dot shows zone position only</div>}
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{background:c.bg,border:`1px solid ${c.fg}55`,padding:10,borderRadius:3}}>
                <div style={{font:`600 10px/1 ${mono}`,color:c.fg,letterSpacing:'0.18em',marginBottom:5}}>{metrics.verdict}</div>
                <div style={{font:`11px/1.45 ${sans}`,color:'#d8dde6'}}>{metrics.reason}</div>
              </div>
              <div style={{font:`9.5px/1 ${mono}`,color:'rgba(216,221,230,0.4)',letterSpacing:'0.14em'}}>FACTORS</div>
              {factors.map(f=>{const pos=f.weight>=0,W=Math.min(1,Math.abs(f.weight)/0.3);return(
                <div key={f.key} style={{display:'flex',alignItems:'center',gap:6,font:`11px/1 ${mono}`}}>
                  <div style={{width:62,color:'#d8dde6'}}>{f.label}</div>
                  <div style={{flex:1,position:'relative',height:11,background:'rgba(255,255,255,0.03)'}}>
                    <div style={{position:'absolute',top:0,bottom:0,left:'50%',width:1,background:'rgba(255,255,255,0.1)'}}/>
                    <div style={{position:'absolute',top:1,bottom:1,left:pos?'50%':`${50-W*50}%`,width:`${W*50}%`,background:pos?VC.COMMIT.fg:VC.TOXIC.fg,opacity:0.85}}/>
                  </div>
                  <div style={{width:46,textAlign:'right',color:pos?VC.COMMIT.fg:VC.TOXIC.fg}}>{pos?'+':''}{fmt(f.weight,3)}</div>
                </div>
              );})}
              <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
                <Spark values={rHist} w={160} h={24} stroke="#4cc9f0"/>
                <span style={{font:`12px/1 ${mono}`,color:'#d8dde6'}}>{fmt(metrics.r,3)}</span>
              </div>
            </div>
          </div>
        )}
      </div>
      {/* RIGHT */}
      <div style={{display:'flex',flexDirection:'column',gap:8,overflow:'hidden'}}>
        {tile('Sensitivity ±0.1','what flips',<div style={{display:'flex',flexDirection:'column',gap:5,font:`10.5px/1.3 ${mono}`}}>
          {sensitivity.map(s=><div key={s.key} style={{display:'grid',gridTemplateColumns:'28px 1fr 1fr',gap:5,alignItems:'center'}}>
            <span style={{color:'#4cc9f0'}}>{s.key}</span>
            <span style={{color:s.flipDn?VC[s.flipDn].fg:'rgba(216,221,230,0.3)'}}>{s.flipDn?`−0.1→${s.flipDn}`:'stable −'}</span>
            <span style={{color:s.flipUp?VC[s.flipUp].fg:'rgba(216,221,230,0.3)',textAlign:'right'}}>{s.flipUp?`+0.1→${s.flipUp}`:'stable +'}</span>
          </div>)}
        </div>)}
        {tile('Forecast',`slope ${forecast.slope>=0?'+':''}${fmt(forecast.slope*1000,1)}·10⁻³/m`,<div style={{display:'flex',flexDirection:'column',gap:4,font:`10.5px/1.35 ${mono}`}}>
          {forecast.points.map(p=>{const cleared=p.r>=metrics.tau,col=cleared?VC.COMMIT.fg:VC.WAIT.fg;return(
            <div key={p.label} style={{display:'grid',gridTemplateColumns:'44px 48px 1fr 32px',gap:4,alignItems:'center'}}>
              <span style={{color:'rgba(216,221,230,0.6)'}}>{p.label}</span>
              <span style={{color:col}}>{fmt(p.r,3)}</span>
              <div style={{height:3,background:'rgba(255,255,255,0.07)',position:'relative'}}>
                <div style={{position:'absolute',left:0,top:0,bottom:0,width:`${p.pAbove*100}%`,background:col}}/>
                <div style={{position:'absolute',left:`${metrics.tau*100}%`,top:-2,bottom:-2,width:1,background:'rgba(255,255,255,0.5)'}}/>
              </div>
              <span style={{color:col,textAlign:'right'}}>{Math.round(p.pAbove*100)}%</span>
            </div>
          );})}
          <div style={{marginTop:6,padding:'6px 8px',background:c.bg,border:`1px solid ${c.fg}44`,borderRadius:2,font:`10px/1.4 ${mono}`,color:c.fg}}>▶ {forecast.window}</div>
        </div>)}
        {tile('Agent Log','',<div style={{display:'flex',flexDirection:'column',gap:2,font:`10px/1.35 ${mono}`,overflow:'hidden'}}>
          {logs.map((l,i)=>{const sc=l.sev==='E'?VC.TOXIC.fg:l.sev==='W'?VC.HOLD.fg:'rgba(216,221,230,0.3)';return(
            <div key={i} style={{display:'grid',gridTemplateColumns:'12px 46px 1fr',gap:5}}>
              <span style={{color:sc}}>{l.sev}</span><span style={{color:'#4cc9f0'}}>{l.src}</span>
              <span style={{color:'#d8dde6',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.msg}</span>
            </div>);})}
        </div>)}
        {tile('History','last 5',<div style={{display:'flex',flexDirection:'column',gap:4,font:`10.5px/1.3 ${mono}`}}>
          {history.slice().reverse().map((h,i)=>{const hc=VC[h.verdict],mins=Math.round((Date.now()-h.t)/60000);return(
            <div key={i} style={{display:'grid',gridTemplateColumns:'40px 1fr 44px 44px',gap:5,alignItems:'center'}}>
              <span style={{color:'rgba(216,221,230,0.35)'}}>{mins}m</span>
              <span style={{color:'#d8dde6'}}>{h.label}</span>
              <span style={{color:'rgba(216,221,230,0.4)',textAlign:'right'}}>{fmt(h.r,2)}</span>
              <span style={{color:hc.fg,fontWeight:600,textAlign:'right',fontSize:9.5,letterSpacing:'0.1em'}}>{h.verdict.slice(0,4)}</span>
            </div>);})}
        </div>)}
      </div>
    </div>
  );
}

// ── BLOOMBERG ─────────────────────────────────────────────
function BloombergView(){
  const{state,update,applyPreset,parseScenario,parsing,metrics,sensitivity,factors,forecast,history,logs,api,presets}=useNerva();
  const blx={bg:'#000',panel:'#050505',panelHi:'#0a0a0a',text:'#f7c948',dim:'#a07f1f',hi:'#fff7d6',green:'#5fff87',red:'#ff4d4d',blue:'#5fbfff',orange:'#ff9a3c',mauve:'#ff7ab5',line:'#1a1a1a',lineHi:'#2a2a2a',mono:'"JetBrains Mono","IBM Plex Mono",monospace'};
  const vc={COMMIT:blx.green,HOLD:blx.text,WAIT:blx.blue,ESCALATE:blx.orange,TOXIC:blx.red};
  const blk=' ▁▂▃▄▅▆▇█';
  const spark=vals=>vals.map(v=>blk[Math.min(8,Math.max(0,Math.round(v*8)))]).join('');
  const panel=(id,title,hint,children,style={})=>(
    <div style={{background:blx.panel,border:`1px solid ${blx.line}`,display:'flex',flexDirection:'column',minHeight:0,...style}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'3px 8px',background:blx.panelHi,borderBottom:`1px solid ${blx.line}`,font:`10.5px/1.2 ${blx.mono}`,letterSpacing:'0.04em'}}>
        <span><span style={{color:blx.dim}}>&lt;{id}&gt;</span>{' '}<span style={{color:blx.hi}}>{title}</span></span>
        {hint&&<span style={{color:blx.dim}}>{hint}</span>}
      </div>
      <div style={{flex:1,minHeight:0,padding:6,fontFamily:blx.mono,fontSize:11,lineHeight:1.4,color:blx.text,overflow:'hidden',display:'flex',flexDirection:'column'}}>{children}</div>
    </div>
  );
  const bar=(v,w=24,col=blx.text)=>{const f=Math.round(v*w);return <span style={{color:col,letterSpacing:'-0.05em'}}>{'█'.repeat(f)}<span style={{color:blx.line}}>{'░'.repeat(w-f)}</span></span>;};
  return(
    <div style={{width:'100%',height:'100%',background:blx.bg,color:blx.text,fontFamily:blx.mono,fontSize:11,display:'grid',gridTemplateRows:'24px 1fr 22px',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 8px',background:blx.text,color:'#000',font:`600 11px/1 ${blx.mono}`,letterSpacing:'0.04em'}}>
        <div style={{display:'flex',gap:16}}><span>NERVA&lt;GO&gt;</span><span>DECISION INTEGRITY TERMINAL v10.0</span><span style={{opacity:0.6}}>SES 7F-2A91</span></div>
        <div style={{display:'flex',gap:12}}><span>{api.region.toUpperCase()}</span><span>{Math.round(api.latency)}MS</span><span>99.982%</span><span>{new Date().toTimeString().slice(0,8)}</span></div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'260px 1fr 1fr 240px',gridTemplateRows:'1fr 1fr 140px',gap:1,background:blx.line,overflow:'hidden'}}>
        {panel('INP','INPUTS','OPERATOR',<>
          <textarea value={state.scenario} onChange={e=>update({scenario:e.target.value})} style={{width:'100%',background:'transparent',color:blx.hi,border:`1px solid ${blx.line}`,font:`10.5px/1.5 ${blx.mono}`,height:60,padding:3,marginBottom:6,resize:'none',outline:'none'}}/>
          <div style={{display:'flex',gap:4,marginBottom:6}}>
            <button onClick={()=>parseScenario(state.scenario)} disabled={parsing} style={{flex:1,background:parsing?'transparent':'rgba(247,201,72,0.12)',border:`1px solid ${parsing?blx.line:blx.text}`,color:parsing?blx.dim:blx.text,font:`700 10px/1 ${blx.mono}`,letterSpacing:'0.08em',padding:'4px 0'}}>
              {parsing?'PARSING...':'F2 · PARSE'}
            </button>
          </div>
          <div style={{display:'flex',flexWrap:'wrap',gap:2,marginBottom:6}}>
            {presets.map(p=><button key={p.id} onClick={()=>applyPreset(p.id)} style={{background:state.activePreset===p.id?blx.text:'transparent',color:state.activePreset===p.id?'#000':blx.dim,border:`1px solid ${blx.line}`,font:`9px/1 ${blx.mono}`,padding:'2px 5px'}}>{p.id.toUpperCase()}</button>)}
          </div>
          {[['E','URGENCY',state.E,v=>update({E:v}),blx.orange],['S','STRATEGY',state.S,v=>update({S:v}),blx.green],['R','RISK',state.R,v=>update({R:v}),blx.red],['Sp','SUPPORT',state.Sp,v=>update({Sp:v}),blx.blue],['St','STABILITY',state.St,v=>update({St:v}),blx.mauve]].map(([sym,lbl,val,set,col])=>(
            <div key={sym} style={{marginBottom:4}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{color:blx.hi}}>{sym} {lbl}</span><span>{fmt(val,3)}</span></div>
              <div style={{height:3,background:blx.lineHi,position:'relative',marginBottom:1}}><div style={{position:'absolute',left:0,top:0,bottom:0,width:`${val*100}%`,background:col}}/></div>
              <input type="range" min="0" max="1" step="0.01" value={val} onChange={e=>set(parseFloat(e.target.value))} style={{accentColor:col,color:col,width:'100%',height:2}}/>
            </div>
          ))}
          <div style={{display:'flex',gap:4,marginTop:4}}>
            {['auto','manual'].map(m=><button key={m} onClick={()=>update({tauMode:m})} style={{flex:1,background:state.tauMode===m?blx.text:'transparent',color:state.tauMode===m?'#000':blx.dim,border:`1px solid ${blx.line}`,font:`9px/1 ${blx.mono}`,padding:'3px 0'}}>{m.toUpperCase()}</button>)}
          </div>
          {state.tauMode==='manual'&&<input type="range" min="0.15" max="0.85" step="0.01" value={state.tauManual} onChange={e=>update({tauManual:parseFloat(e.target.value)})} style={{accentColor:blx.text,color:blx.text,width:'100%',marginTop:3}}/>}
        </>,{gridRow:'span 2'})}
        {panel('VRD','VERDICT','',<div style={{display:'flex',flexDirection:'column',gap:4}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,borderBottom:`1px solid ${blx.lineHi}`,paddingBottom:6,marginBottom:4}}>
            {[[metrics.r,'|r|'],[metrics.tau,'τ'],[metrics.EV,'EV'],[Math.round(metrics.theta)+'°','θ'],[Math.round(metrics.phi)+'°','Φ']].map(([v,l])=>(
              <div key={l}><div style={{color:blx.dim,fontSize:9.5}}>{l}</div><div style={{color:blx.hi,fontSize:17,fontWeight:300}}>{typeof v==='number'?fmt(v,3):v}</div></div>
            ))}
          </div>
          <div style={{fontSize:30,fontWeight:700,color:vc[metrics.verdict],letterSpacing:'0.08em',lineHeight:1}}>{metrics.verdict}</div>
          <div style={{fontSize:11,color:blx.hi,marginTop:2}}>&gt; {metrics.reason.slice(0,90)}</div>
          <div style={{fontSize:10,color:blx.dim}}>BAND: |r|±{fmt(metrics.entropy*0.15,2)} · σ={fmt(metrics.entropy,2)}</div>
        </div>)}
        {panel('FCT','FORECAST','',<div style={{display:'flex',flexDirection:'column',gap:3}}>
          {forecast.points.map(p=>{const cleared=p.r>=metrics.tau,col=cleared?blx.green:blx.red,f=Math.round(p.pAbove*10);return(
            <div key={p.label} style={{display:'grid',gridTemplateColumns:'44px 52px 38px 1fr',gap:4,alignItems:'center'}}>
              <span style={{color:blx.hi}}>{p.label}</span><span style={{color:col}}>{fmt(p.r,3)}</span><span style={{color:blx.dim,textAlign:'right'}}>{fmt(p.sigma,2)}</span>
              <span style={{textAlign:'right',display:'flex',alignItems:'center',justifyContent:'flex-end',gap:4}}><span style={{color:col,letterSpacing:'-0.05em'}}>{'█'.repeat(f)}<span style={{color:blx.line}}>{'░'.repeat(10-f)}</span></span><span style={{color:col,width:26,textAlign:'right'}}>{Math.round(p.pAbove*100)}%</span></span>
            </div>);})}
          <div style={{marginTop:'auto',borderTop:`1px solid ${blx.line}`,paddingTop:4,color:forecast.window.startsWith('ACT')?blx.green:blx.text}}>▶ {forecast.window}</div>
        </div>)}
        {panel('MAP','PHASE MAP',`E:${fmt(state.E,2)}·I:${fmt(metrics.integrity,2)}`,<div style={{flex:1,minHeight:0}}><PhaseMap metrics={metrics} state={state} W={260} H={160}/></div>)}
        {panel('QLT','QUALITY METRICS','0–1',<div style={{display:'flex',flexDirection:'column',gap:5}}>
          {[['INTEGRITY ',metrics.integrity,blx.green],['COHERENCE ',metrics.coherence,blx.blue],['PURITY    ',metrics.purity,blx.mauve],['REVERSIBLE',metrics.reversibility,'#c084fc'],['ENTROPY   ',metrics.entropy,blx.orange],['EXP-VALUE ',(metrics.EV+1)/2,metrics.EV>0?blx.green:blx.red]].map(([l,v,col])=>(
            <div key={l} style={{display:'grid',gridTemplateColumns:'90px 1fr 50px',gap:5,alignItems:'center'}}><span style={{color:blx.dim,fontSize:10.5}}>{l}</span>{bar(v,22,col)}<span style={{color:col,textAlign:'right'}}>{fmt(v,3)}</span></div>))}
        </div>)}
        {panel('FAC','FACTORS','signed',<div style={{display:'flex',flexDirection:'column',gap:3}}>
          {factors.map(f=>{const pos=f.weight>=0,mag=Math.min(11,Math.round(Math.abs(f.weight)*(11/0.3)));return(
            <div key={f.key} style={{display:'grid',gridTemplateColumns:'60px 1fr 50px 48px',gap:4,alignItems:'center',fontSize:11}}>
              <span style={{color:blx.hi}}>{f.label.toUpperCase().slice(0,8)}</span>
              <span style={{color:pos?blx.green:blx.red,whiteSpace:'pre',letterSpacing:'-0.04em',fontSize:10}}>{pos?' '.repeat(11)+'+'+'█'.repeat(mag)+'·'.repeat(11-mag):' '.repeat(11-mag)+'█'.repeat(mag)+'-'+'·'.repeat(11)}</span>
              <span style={{color:blx.text,textAlign:'right'}}>{fmt(f.raw,2)}</span>
              <span style={{color:pos?blx.green:blx.red,textAlign:'right'}}>{pos?'+':''}{fmt(f.weight,3)}</span>
            </div>);})}
        </div>)}
        {panel('SEN','SENSITIVITY','δ=±0.10',<>{sensitivity.map(s=>(
          <div key={s.key} style={{display:'grid',gridTemplateColumns:'36px 90px 1fr 90px',gap:4,alignItems:'center',fontSize:11,marginBottom:3}}>
            <span style={{color:blx.hi}}>{s.key}</span>
            <span style={{color:s.flipDn?vc[s.flipDn]:blx.dim}}>{s.flipDn?`▶ ${s.flipDn.slice(0,4)}`:'— stable'}</span>
            <span style={{color:blx.text,textAlign:'center'}}>{s.dDn>=0?'+':''}{fmt(s.dDn,3)}/{s.dUp>=0?'+':''}{fmt(s.dUp,3)}</span>
            <span style={{color:s.flipUp?vc[s.flipUp]:blx.dim,textAlign:'right'}}>{s.flipUp?`${s.flipUp.slice(0,4)} ◀`:'stable —'}</span>
          </div>))}</>)}
        {panel('HST','HISTORY','last 5',<div style={{display:'flex',flexDirection:'column',gap:3}}>
          {history.slice().reverse().map((h,i)=>{const mins=Math.round((Date.now()-h.t)/60000);return(
            <div key={i} style={{display:'grid',gridTemplateColumns:'40px 80px 48px 1fr',gap:4}}>
              <span style={{color:blx.dim}}>{mins}m</span><span style={{color:blx.hi}}>{h.label}</span>
              <span style={{textAlign:'right'}}>{fmt(h.r,2)}</span><span style={{color:vc[h.verdict],textAlign:'right',fontWeight:600}}>{h.verdict}</span>
            </div>);})}
          <div style={{marginTop:'auto',color:blx.dim,fontSize:10}}>TRACE {spark(history.map(h=>h.r).concat([metrics.r]))}</div>
        </div>)}
        {panel('LOG','AGENT LOG','streaming',<div style={{display:'flex',flexDirection:'column',gap:1,fontSize:10.5}}>
          {logs.map((l,i)=>{const sc=l.sev==='E'?blx.red:l.sev==='W'?blx.orange:blx.dim;return(
            <div key={i} style={{display:'grid',gridTemplateColumns:'12px 44px 1fr',gap:4}}>
              <span style={{color:sc}}>{l.sev}</span><span style={{color:blx.blue}}>{l.src}</span>
              <span style={{color:blx.hi,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.msg}</span>
            </div>);})}
        </div>)}
      </div>
      <div style={{background:blx.text,color:'#000',padding:'0 8px',display:'flex',alignItems:'center',justifyContent:'space-between',font:`600 11px/1 ${blx.mono}`,letterSpacing:'0.04em'}}>
        <div style={{display:'flex',gap:12}}><span>F1:HELP</span><span>F2:PARSE</span><span>F3:LOAD</span><span>F4:SAVE</span><span>F5:COMPARE</span><span>F6:AUDIT</span><span>F9:OVERRIDE</span></div>
        <div style={{display:'flex',gap:12}}><span>{metrics.verdict}</span><span>|r|={fmt(metrics.r,3)}</span><span>τ={fmt(metrics.tau,3)}</span><span style={{background:'#000',color:blx.green,padding:'0 6px'}}>● LIVE</span></div>
      </div>
    </div>
  );
}

// ── PHASE SPACE ───────────────────────────────────────────
function PhaseSpaceView(){

  const psx={bg:'#f5f1e8',paper:'#fbf8f0',ink:'#1a1814',dim:'rgba(26,24,20,0.62)',faint:'rgba(26,24,20,0.38)',rule:'rgba(26,24,20,0.15)',ruleHi:'rgba(26,24,20,0.35)',accent:'#a3361b',serif:'"Newsreader","Georgia",serif',sans:'"IBM Plex Sans",system-ui,sans-serif',mono:'"JetBrains Mono",monospace'};

          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em'}}>VOL. 10 · ISSUE 0 · {new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'}).toUpperCase()} · INTERNAL REVIEW</div>
          <h1 style={{margin:'3px 0 0',font:`400 26px/1 ${psx.serif}`,letterSpacing:'-0.02em'}}>Nerva <em>—</em> a decision integrity engine</h1>
          <div style={{font:`italic 12px ${psx.serif}`,color:psx.dim,marginTop:2}}>Phase-space evaluation · Bloch kernel v10.0 · {metrics.validation.components_consistent?'✓ consistent':'⚠ check normalization'}</div>
        </div>
        <div style={{textAlign:'right',font:`9.5px/1.5 ${psx.mono}`,color:psx.faint}}><div style={{color:psx.ink}}>7F-2A91</div><div>{Math.round(api.latency)}ms</div><div style={{color:psvc.COMMIT.fg}}>● {api.status}</div></div>
      </header>
      <div style={{display:'grid',gridTemplateColumns:'250px 1fr 240px',minHeight:0,overflow:'hidden'}}>
        <aside style={{padding:'12px 16px',borderRight:`1px solid ${psx.rule}`,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',marginBottom:4}}>§ 1 — SCENARIO</div>
          <textarea value={state.scenario} onChange={e=>update({scenario:e.target.value})} style={{background:'transparent',font:`12px/1.5 ${psx.serif}`,color:psx.ink,height:60,padding:0,marginBottom:5}}/>
          <button onClick={()=>parseScenario(state.scenario)} disabled={parsing} style={{background:parsing?'transparent':c.bg,border:`1px solid ${c.fg}`,color:c.fg,font:`italic 11.5px ${psx.serif}`,padding:'4px 0',marginBottom:7}}>{parsing?'parsing…':'⚡ parse with AI'}</button>
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',marginBottom:3}}>CORPUS</div>
          <div style={{display:'flex',flexDirection:'column',borderTop:`1px solid ${psx.rule}`}}>
            {presets.map(p=><button key={p.id} onClick={()=>applyPreset(p.id)} style={{background:state.activePreset===p.id?c.bg:'transparent',border:'none',borderBottom:`1px solid ${psx.rule}`,textAlign:'left',cursor:'pointer',padding:'4px 2px',color:psx.ink}}>
              <span style={{font:`500 12px/1 ${psx.serif}`,color:state.activePreset===p.id?psx.accent:psx.ink}}>{p.name}</span>
              <span style={{font:`9px ${psx.mono}`,color:psx.faint,marginLeft:5}}>{p.id.toUpperCase()}</span>
            </button>)}
          </div>
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',margin:'8px 0 4px'}}>§ 2 — PARAMETERS</div>
          {[['E','Urgency',state.E,v=>update({E:v})],['S','Strategy',state.S,v=>update({S:v})],['R','Risk',state.R,v=>update({R:v})],['Sp','Support',state.Sp,v=>update({Sp:v})],['St','Stability',state.St,v=>update({St:v})]].map(([sym,lbl,val,set])=>(
            <div key={sym} style={{display:'flex',flexDirection:'column',gap:2,padding:'4px 0',borderBottom:`1px solid ${psx.rule}`}}>
              <div style={{display:'flex',justifyContent:'space-between'}}><span style={{font:`12px/1 ${psx.serif}`}}><em style={{color:psx.accent,marginRight:4}}>{sym}</em>{lbl}</span><span style={{font:`11px/1 ${psx.mono}`}}>{fmt(val,2)}</span></div>
              <input type="range" min="0" max="1" step="0.01" value={val} onChange={e=>set(parseFloat(e.target.value))} style={{accentColor:psx.accent,width:'100%'}}/>
            </div>
          ))}
        </aside>
        <main style={{padding:'12px 18px',overflow:'hidden',display:'grid',gridTemplateRows:'auto 1fr auto',gap:8,minHeight:0}}>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:14,alignItems:'start',paddingBottom:8,borderBottom:`1px solid ${psx.rule}`}}>
            <div style={{padding:'7px 14px',background:c.bg,border:`1px solid ${c.fg}`,minWidth:120,textAlign:'center'}}>
              <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.2em'}}>RESULT</div>
              <div style={{font:`400 24px/1 ${psx.serif}`,color:c.fg,marginTop:3}}>{metrics.verdict.charAt(0)+metrics.verdict.slice(1).toLowerCase()}</div>
              <div style={{font:`9.5px ${psx.mono}`,color:psx.faint,marginTop:2}}>|r|={fmt(metrics.r,3)} τ={fmt(metrics.tau,3)}</div>
            </div>
            <div style={{font:`italic 12px/1.55 ${psx.serif}`,color:psx.ink,columnCount:2,columnGap:18,textIndent:'1em'}}>
              {metrics.reason} At ({fmt(state.E,2)}, {fmt(metrics.integrity,2)}) in phase space. Bloch: r=({fmt(metrics.r_x,4)}, {fmt(metrics.r_y,4)}, {fmt(metrics.r_z,4)}). Purity {fmt(metrics.purity,4)} ∈ [0.5,1]. S(ρ)={fmt(metrics.entropy,4)}.
            </div>
          </div>
          <figure style={{margin:0,display:'flex',flexDirection:'column',minHeight:0}}>
            <div style={{flex:1,minHeight:0,position:'relative',border:`1px solid ${psx.rule}`,background:psx.paper}}>
              <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{width:'100%',height:'100%',display:'block'}}>
                {[{y:0.65,x2:1,col:psvc.COMMIT},{y:0.35,x0:0,w:0.5,col:psvc.HOLD},{y:0.35,x0:0.5,w:0.5,col:psvc.ESCALATE},{y:0,x0:0,w:0.5,yt:0.65,col:psvc.ESCALATE},{y:0,x0:0.5,w:0.5,yt:0.65,col:psvc.TOXIC}].map((_,i)=>{
                  const zones=[[0,0,1,0.35,psvc.COMMIT.fg],[0,0.35,0.5,0.30,psvc.HOLD.fg],[0.5,0.35,0.5,0.30,psvc.ESCALATE.fg],[0,0.65,0.5,0.35,psvc.ESCALATE.fg],[0.5,0.65,0.5,0.35,psvc.TOXIC.fg]];
                  const[x0,y0,w,h,col]=zones[i];
                  return <rect key={i} x={xp(x0)} y={yp(y0+h)} width={pw*w} height={ph*h} fill={col} opacity="0.07"/>;
                })}
                {[['COMMIT',0.5,0.18,psvc.COMMIT.fg],['HOLD',0.25,0.52,psvc.HOLD.fg],['ESCALATE',0.75,0.52,psvc.ESCALATE.fg],['ESCALATE',0.25,0.85,psvc.ESCALATE.fg],['TOXIC',0.75,0.85,psvc.TOXIC.fg]].map(([n,xi,yi,col])=>(
                  <text key={n+xi} x={xp(xi)} y={yp(1-yi)} textAnchor="middle" style={{font:`italic 12px ${psx.serif}`,fill:col,opacity:0.7}}>{n}</text>
                ))}
                <line x1={M.l} y1={yp(metrics.tau)} x2={M.l+pw} y2={yp(metrics.tau)} stroke={c.fg} strokeDasharray="4 3" strokeWidth="1" opacity="0.6"/>
                <text x={M.l+pw-2} y={yp(metrics.tau)-4} textAnchor="end" style={{font:`9px ${psx.mono}`,fill:c.fg,opacity:0.7}}>τ={fmt(metrics.tau,3)}</text>
                {[0,0.25,0.5,0.75,1].map(t=><g key={t}><line x1={xp(t)} y1={M.t} x2={xp(t)} y2={M.t+ph} stroke={psx.rule} strokeDasharray="2 3"/><line x1={M.l} y1={yp(t)} x2={M.l+pw} y2={yp(t)} stroke={psx.rule} strokeDasharray="2 3"/><text x={xp(t)} y={M.t+ph+16} textAnchor="middle" style={{font:`9.5px ${psx.mono}`,fill:psx.faint}}>{t.toFixed(2)}</text><text x={M.l-5} y={yp(t)+3} textAnchor="end" style={{font:`9.5px ${psx.mono}`,fill:psx.faint}}>{t.toFixed(2)}</text></g>)}
                <line x1={M.l} y1={M.t} x2={M.l} y2={M.t+ph} stroke={psx.ink} strokeWidth="1.2"/>
                <line x1={M.l} y1={M.t+ph} x2={M.l+pw} y2={M.t+ph} stroke={psx.ink} strokeWidth="1.2"/>
                <line x1={M.l} y1={yp(0.35)} x2={M.l+pw} y2={yp(0.35)} stroke={psx.ruleHi}/>
                <line x1={M.l} y1={yp(0.65)} x2={M.l+pw} y2={yp(0.65)} stroke={psx.ruleHi}/>
                <line x1={xp(0.5)} y1={yp(0.65)} x2={xp(0.5)} y2={M.t+ph} stroke={psx.ruleHi}/>
                <text x={M.l+pw/2} y={H-5} textAnchor="middle" style={{font:`italic 11px ${psx.serif}`,fill:psx.ink}}>Urgency  E</text>
                <text x={12} y={M.t+ph/2} textAnchor="middle" transform={`rotate(-90 12 ${M.t+ph/2})`} style={{font:`italic 11px ${psx.serif}`,fill:psx.ink}}>Integrity</text>
                {history.map((h,i)=><circle key={i} cx={xp(h.E)} cy={yp(h.integrity)} r="2.5" fill={psvc[h.verdict]?.fg||psx.faint} opacity={0.2+i*0.09}/>)}
                {/* history trail removed — dots only */}
                <ellipse cx={px_} cy={py_} rx={rx} ry={ry} fill="none" stroke={c.fg} strokeWidth="0.8" strokeDasharray="2 2" opacity="0.7"/>
                <ellipse cx={px_} cy={py_} rx={rx*0.5} ry={ry*0.5} fill={c.fg} opacity="0.10"/>
                <circle cx={px_} cy={py_} r="7" fill="none" stroke={c.fg} strokeWidth="1.5"/>
                <circle cx={px_} cy={py_} r="3.5" fill={metrics.signal?c.fg:'none'} stroke={c.fg} strokeWidth="1"/>
                <line x1={px_+6} y1={py_-6} x2={px_+28} y2={py_-18} stroke={c.fg} strokeWidth="0.8"/>
                <text x={px_+32} y={py_-20} style={{font:`italic 11px ${psx.serif}`,fill:c.fg}}>{metrics.verdict.toLowerCase()} · |r|={fmt(metrics.r,2)}</text>
              </svg>
            </div>
            <figcaption style={{marginTop:4,font:`10.5px/1.4 ${psx.sans}`,color:psx.dim}}>
              <span style={{font:`600 10px ${psx.mono}`,color:psx.ink,marginRight:5}}>FIG. 1</span>
              Phase diagram. τ={fmt(metrics.tau,3)} (dashed). Envelope = entropy-scaled confidence. Trail = last {history.length} sessions.
            </figcaption>
          </figure>
          <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',borderTop:`1px solid ${psx.ink}`,paddingTop:6,gap:10}}>
            {[[fmt(metrics.r,3),'|r|','signal',c.fg],[fmt(metrics.tau,3),'τ','threshold',null],[fmt(metrics.EV,3),'EV','exp. value',metrics.EV>0?psvc.COMMIT.fg:psvc.TOXIC.fg],[Math.round(metrics.theta)+'°','θ','integrity angle',null],[Math.round(metrics.phi)+'°','Φ','coherence angle',null],[fmt(metrics.reversibility,2),'ρ','reversibility',null]].map(([v,l,sub,col])=>(
              <div key={l} style={{borderBottom:`1px solid ${psx.rule}`,paddingBottom:4}}>
                <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.14em',marginBottom:2}}>{l}</div>
                <div style={{font:`300 20px/1 ${psx.serif}`,color:col||psx.ink}}>{v}</div>
                <div style={{font:`italic 9.5px ${psx.serif}`,color:psx.dim,marginTop:1}}>{sub}</div>
              </div>
            ))}
          </div>
        </main>
        <aside style={{padding:'12px 16px',borderLeft:`1px solid ${psx.rule}`,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',marginBottom:4}}>§ 3 — BLOCH</div>
          {[['r_x',metrics.r_x],['r_y',metrics.r_y],['r_z',metrics.r_z],['|r|',metrics.r]].map(([l,v])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:`1px solid ${psx.rule}`,font:`11px ${psx.mono}`,color:psx.ink}}><span>{l}</span><span>{fmt(v,4)}</span></div>
          ))}
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',margin:'8px 0 4px'}}>§ 4 — DERIVED</div>
          {[['Purity',metrics.purity],['Entropy',metrics.entropy],['Coherence',metrics.coherence],['Integrity',metrics.integrity]].map(([l,v])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:5,padding:'3px 0',borderBottom:`1px solid ${psx.rule}`}}>
              <div style={{flex:1,font:`12px ${psx.serif}`,color:psx.ink}}>{l}</div>
              <div style={{width:50,height:3,background:psx.rule,position:'relative'}}><div style={{position:'absolute',left:0,top:0,bottom:0,width:`${v*100}%`,background:psx.ink}}/></div>
              <div style={{width:28,textAlign:'right',font:`10px ${psx.mono}`}}>{fmt(v,2)}</div>
            </div>
          ))}
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',margin:'8px 0 4px'}}>§ 5 — SENSITIVITY</div>
          {sensitivity.map(s=>(
            <div key={s.key} style={{display:'grid',gridTemplateColumns:'18px 1fr 1fr',alignItems:'center',padding:'2px 0',borderBottom:`1px dotted ${psx.rule}`,font:`11.5px ${psx.serif}`}}>
              <em style={{color:psx.accent}}>{s.key}</em>
              <span style={{color:s.flipDn?psvc[s.flipDn].fg:psx.faint,fontStyle:s.flipDn?'normal':'italic',fontSize:11}}>{s.flipDn?`↓ ${s.flipDn.toLowerCase()}`:'no flip ↓'}</span>
              <span style={{color:s.flipUp?psvc[s.flipUp].fg:psx.faint,fontStyle:s.flipUp?'normal':'italic',textAlign:'right',fontSize:11}}>{s.flipUp?`${s.flipUp.toLowerCase()} ↑`:'↑ no flip'}</span>
            </div>
          ))}
          <div style={{font:`9px ${psx.mono}`,color:psx.faint,letterSpacing:'0.18em',margin:'8px 0 4px'}}>§ 6 — VALIDATION</div>
          {Object.entries(metrics.validation).map(([k,v])=>(
            <div key={k} style={{font:`9.5px/1.6 ${psx.mono}`,color:v?psvc.COMMIT.fg:psvc.TOXIC.fg}}>{v?'✓':'✗'} {k.replace(/_/g,' ')}</div>
          ))}
        </aside>
      </div>
    </div>
  );
}

            <div style={{font:`9.5px ${brx.mono}`,color:brx.dim,letterSpacing:'0.16em',marginBottom:3}}>CASE LIBRARY</div>
            <div style={{display:'flex',flexDirection:'column',border:`1px solid ${brx.ink}`}}>
              {presets.map((p,i)=><button key={p.id} onClick={()=>applyPreset(p.id)} style={{background:state.activePreset===p.id?brx.ink:brx.paper,color:state.activePreset===p.id?brx.bg:brx.ink,border:'none',borderTop:i>0?`1px solid ${brx.ink}`:'none',font:`700 10.5px/1 ${brx.mono}`,letterSpacing:'0.08em',padding:'5px 7px',cursor:'pointer',textAlign:'left',display:'flex',justifyContent:'space-between'}}>
                <span>{p.name.toUpperCase()}</span><span style={{opacity:0.5,fontWeight:400}}>{p.id}</span>
              </button>)}
            </div>
          </>)}
          {sec(2,'PARAMETERS',<>
            {[['E','URGENCY',state.E,v=>update({E:v})],['S','STRATEGY',state.S,v=>update({S:v})],['R','RISK',state.R,v=>update({R:v})],['Sp','SUPPORT',state.Sp,v=>update({Sp:v})],['St','STABILITY',state.St,v=>update({St:v})]].map(([sym,lbl,val,set])=>(
              <div key={sym} style={{marginBottom:7}}>
                <div style={{display:'flex',justifyContent:'space-between'}}><span style={{font:`700 10.5px ${brx.mono}`,letterSpacing:'0.08em'}}>{sym} · {lbl}</span><span style={{font:`700 11px ${brx.mono}`}}>{fmt(val,2)}</span></div>
                <div>{bbar(val)}</div>
                <input type="range" min="0" max="1" step="0.01" value={val} onChange={e=>set(parseFloat(e.target.value))} style={{accentColor:brx.ink,color:brx.ink,width:'100%',height:2,marginTop:1}}/>
              </div>
            ))}
            <div style={{marginTop:2}}>
              <div style={{font:`700 10.5px ${brx.mono}`,letterSpacing:'0.08em',marginBottom:3}}>τ · THRESHOLD</div>
              <div style={{display:'flex',border:`1px solid ${brx.ink}`}}>
                {['auto','manual'].map(m=><button key={m} onClick={()=>update({tauMode:m})} style={{flex:1,background:state.tauMode===m?brx.ink:brx.paper,color:state.tauMode===m?brx.bg:brx.ink,border:'none',font:`700 10.5px ${brx.mono}`,letterSpacing:'0.12em',padding:'4px 0',cursor:'pointer'}}>{m.toUpperCase()}</button>)}
              </div>
              {state.tauMode==='manual'?<><div style={{marginTop:3}}>{bbar(state.tauManual)}</div><input type="range" min="0.15" max="0.85" step="0.01" value={state.tauManual} onChange={e=>update({tauManual:parseFloat(e.target.value)})} style={{accentColor:brx.ink,color:brx.ink,width:'100%',marginTop:2}}/><div style={{font:`10.5px ${brx.mono}`,color:brx.dim}}>τ = {fmt(state.tauManual,3)}</div></>
              :<div style={{marginTop:3,font:`9.5px/1.4 ${brx.mono}`,color:brx.dim}}>τ = 0.25+0.35·S(ρ)+0.25·R−0.15·rev = {fmt(metrics.tauAuto,4)}</div>}
            </div>
          </>)}
        </div>
        <div style={{gridColumn:'span 2',padding:'11px 18px',overflow:'hidden',display:'grid',gridTemplateRows:'auto auto 1fr auto',gap:10,minHeight:0,borderRight:`1px solid ${brx.ink}`}}>
          <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:14,alignItems:'start'}}>
            <div style={{border:`3px solid ${vCol}`,padding:'5px 12px 9px',textAlign:'left'}}>
              <div style={{font:`700 9.5px ${brx.mono}`,letterSpacing:'0.18em',color:brx.dim}}>VERDICT N° 1</div>
              <div style={{font:`900 68px/0.9 ${brx.mono}`,color:vCol,letterSpacing:'-0.04em',marginTop:2}}>{metrics.verdict}</div>
              <div style={{font:`700 9.5px ${brx.mono}`,letterSpacing:'0.22em',color:vCol,marginTop:3}}>{isVeto?'HARD VETO':metrics.verdict==='COMMIT'?'PROCEED':metrics.verdict==='HOLD'?'RECHECK':metrics.verdict==='WAIT'?'INSUFFICIENT':'ROUTE HUMAN'}</div>
            </div>
            <div style={{paddingTop:2}}>
              <div style={{font:`11.5px/1.55 ${brx.mono}`,color:brx.ink,textTransform:'uppercase',letterSpacing:'0.01em',marginBottom:8}}>{metrics.reason}</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',borderTop:`2px solid ${brx.ink}`,borderBottom:`2px solid ${brx.ink}`}}>
                {[['|r|',fmt(metrics.r,3)],['τ',fmt(metrics.tau,3)],['EV',fmt(metrics.EV,3)],['Θ°',Math.round(metrics.theta)],['ρ',fmt(metrics.reversibility,2)]].map(([l,v],i,arr)=>(
                  <div key={l} style={{padding:'5px 7px',borderRight:i<arr.length-1?`1px solid ${brx.ink}`:'none'}}>
                    <div style={{font:`9px ${brx.mono}`,color:brx.dim,letterSpacing:'0.16em'}}>{l}</div>
                    <div style={{font:`400 19px/1 ${brx.mono}`,color:brx.ink,marginTop:2}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:10,marginTop:5,font:`9px ${brx.mono}`}}>
                {Object.entries(metrics.validation).map(([k,v])=><span key={k} style={{color:v?'#2a7a2a':brx.signal}}>{v?'✓':'✗'} {k.split('_')[0]}</span>)}
              </div>
            </div>
          </div>
          {sec(3,'QUALITY',<div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',columnGap:18,rowGap:3}}>
            {[['INTEGRITY',metrics.integrity],['COHERENCE',metrics.coherence],['PURITY',metrics.purity],['ENTROPY',metrics.entropy],['REVERSIBLE',metrics.reversibility],['EXP-VALUE',(metrics.EV+1)/2]].map(([l,v])=>(
              <div key={l} style={{display:'grid',gridTemplateColumns:'80px 1fr 36px',gap:4,alignItems:'center'}}>
                <span style={{font:`700 10px ${brx.mono}`}}>{l}</span><span>{bbar(v,16)}</span>
                <span style={{font:`11px ${brx.mono}`,textAlign:'right'}}>{fmt(v,2)}</span>
              </div>
            ))}
          </div>)}
          {sec(4,'DECISION SPACE',<div style={{display:'grid',gridTemplateColumns:'1fr 160px',gap:12,flex:1,minHeight:0}}>
            <svg viewBox="0 0 380 250" preserveAspectRatio="xMidYMid meet" style={{width:'100%',height:'100%',display:'block'}}>
              <defs><pattern id="brhatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke={brx.ink} strokeWidth="0.6"/></pattern></defs>
              {[[0,0,380,87,'COMMIT',false],[0,87,190,75,'HOLD',false],[190,87,190,75,'ESC',false],[0,162,190,88,'ESC',false],[190,162,190,88,'TOXIC',true]].map(([x,y,w,h,n,hatch],i)=>(
                <g key={i}><rect x={x} y={y} width={w} height={h} fill={hatch?'url(#brhatch)':brx.ink} opacity={hatch?0.15:0.04}/><text x={x+w/2} y={y+h/2+4} textAnchor="middle" style={{font:`700 9.5px ${brx.mono}`,fill:brx.ink,letterSpacing:'0.18em',opacity:0.6}}>{n}</text></g>
              ))}
              <rect x="0" y="0" width="380" height="250" fill="none" stroke={brx.ink} strokeWidth="1.5"/>
              {[0.25,0.5,0.75].map(t=><g key={t}><line x1={t*380} y1="0" x2={t*380} y2="250" stroke={brx.ruleL}/><line x1="0" y1={t*250} x2="380" y2={t*250} stroke={brx.ruleL}/></g>)}
              <line x1="0" y1="87" x2="380" y2="87" stroke={brx.ink} strokeWidth="1"/>
              <line x1="0" y1="162" x2="380" y2="162" stroke={brx.ink} strokeWidth="1"/>
              <line x1="190" y1="87" x2="190" y2="250" stroke={brx.ink} strokeWidth="1"/>
              <line x1="0" y1={(1-metrics.tau)*250} x2="380" y2={(1-metrics.tau)*250} stroke={isVeto?brx.signal:brx.ink} strokeDasharray="4 3" strokeWidth="1.2"/>
              {history.map((h,i)=><circle key={i} cx={h.E*380} cy={(1-h.integrity)*250} r="2" fill={brx.ink} opacity={0.25+i*0.08}/>)}
              {/* history trail removed */}
              {(()=>{const px=state.E*380,py=(1-metrics.integrity)*250,col=isVeto?brx.signal:brx.ink;return<><line x1="0" y1={py} x2="380" y2={py} stroke={col} strokeDasharray="2 3"/><line x1={px} y1="0" x2={px} y2="250" stroke={col} strokeDasharray="2 3"/><rect x={px-7} y={py-7} width="14" height="14" fill="none" stroke={col} strokeWidth="1.5"/><circle cx={px} cy={py} r="3" fill={col}/><text x={px+11} y={py-9} style={{font:`700 10px ${brx.mono}`,fill:col}}>({fmt(state.E,2)},{fmt(metrics.integrity,2)})</text></>})()}
              {[0,0.5,1].map(t=><g key={t}><text x={t*380} y="264" textAnchor="middle" style={{font:`8.5px ${brx.mono}`,fill:brx.dim}}>{t.toFixed(1)}</text><text x="-3" y={(1-t)*250+3} textAnchor="end" style={{font:`8.5px ${brx.mono}`,fill:brx.dim}}>{t.toFixed(1)}</text></g>)}
            </svg>
            <div style={{display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
              <div><div style={{font:`700 9px ${brx.mono}`,letterSpacing:'0.16em',color:brx.dim,marginBottom:3}}>LEGEND</div><div style={{font:`10.5px/1.7 ${brx.mono}`}}>X · URGENCY (E)<br/>Y · INTEGRITY<br/>□ · CURRENT<br/>· · HISTORY<br/>— · τ</div></div>
              <div><div style={{font:`700 9px ${brx.mono}`,letterSpacing:'0.16em',color:brx.dim,marginBottom:3}}>BLOCH r</div><div style={{font:`10.5px/1.5 ${brx.mono}`}}>x {fmt(metrics.r_x,4)}<br/>y {fmt(metrics.r_y,4)}<br/>z {fmt(metrics.r_z,4)}<br/>|r| {fmt(metrics.r,4)}</div></div>
              <div><div style={{font:`700 9px ${brx.mono}`,letterSpacing:'0.16em',color:brx.dim,marginBottom:2}}>TO COMMIT</div><div style={{font:`10.5px/1.5 ${brx.mono}`,color:brx.dim}}>{metrics.integrity>=0.6&&metrics.EV>0.1?'cleared':`+${fmt(Math.max(0,0.6-metrics.integrity),2)} I`}</div></div>
            </div>
          </div>)}
        </div>
        <div style={{padding:'11px 13px',overflow:'hidden',display:'flex',flexDirection:'column',gap:12,minHeight:0}}>
          {sec(5,'FACTORS',factors.map(f=>{const pos=f.weight>=0,mag=Math.min(8,Math.round(Math.abs(f.weight)*(8/0.3)));const bar2=pos?'·'.repeat(8)+'+'+'█'.repeat(mag)+'·'.repeat(8-mag):'·'.repeat(8-mag)+'█'.repeat(mag)+'-'+'·'.repeat(8);return(
            <div key={f.key} style={{display:'grid',gridTemplateColumns:'58px 1fr 38px',gap:3,alignItems:'center',font:`10px/1.5 ${brx.mono}`}}>
              <span style={{fontWeight:700}}>{f.label.toUpperCase().slice(0,7)}</span>
              <span style={{color:pos?brx.ink:brx.signal,letterSpacing:'-0.06em'}}>{bar2}</span>
              <span style={{textAlign:'right',color:pos?brx.ink:brx.signal}}>{pos?'+':''}{fmt(f.weight,2)}</span>
            </div>);})
          )}
          {sec(6,'SENSITIVITY',<>
            <div style={{font:`9.5px/1 ${brx.mono}`,color:brx.dim,marginBottom:3}}>δ = ±0.10</div>
            {sensitivity.map(s=><div key={s.key} style={{display:'grid',gridTemplateColumns:'18px 1fr 1fr',alignItems:'center',font:`10px/1.5 ${brx.mono}`}}>
              <span style={{fontWeight:700}}>{s.key}</span>
              <span style={{color:s.flipDn?brx.signal:brx.dim}}>{s.flipDn?`◀ ${s.flipDn.slice(0,4)}`:'— stable'}</span>
              <span style={{color:s.flipUp?brx.signal:brx.dim,textAlign:'right'}}>{s.flipUp?`${s.flipUp.slice(0,4)} ▶`:'stable —'}</span>
            </div>)}
          </>)}
          {sec(7,'LOG',<div style={{display:'flex',flexDirection:'column',font:`9.5px/1.45 ${brx.mono}`,color:brx.dim,overflow:'hidden'}}>
            {logs.map((l,i)=>{const sc=l.sev==='E'?brx.signal:l.sev==='W'?'#a07010':brx.dim;return<div key={i} style={{display:'grid',gridTemplateColumns:'10px 42px 1fr',gap:3}}><span style={{color:sc}}>{l.sev}</span><span style={{color:brx.ink}}>{l.src}</span><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.msg}</span></div>;})}
          </div>)}
          {sec(8,'HISTORY',<div style={{display:'flex',flexDirection:'column',font:`10px/1.5 ${brx.mono}`}}>
            {history.slice().reverse().map((h,i)=>{const isBad=h.verdict==='TOXIC'||h.verdict==='ESCALATE',mins=Math.round((Date.now()-h.t)/60000);return(
              <div key={i} style={{display:'grid',gridTemplateColumns:'26px 65px 34px 1fr',gap:4,borderBottom:`1px solid ${brx.ruleL}`,padding:'2px 0'}}>
                <span style={{color:brx.dim}}>{mins}m</span><span style={{fontWeight:700}}>{h.label.slice(0,8)}</span>
                <span style={{color:brx.dim,textAlign:'right'}}>{fmt(h.r,2)}</span>
                <span style={{color:isBad?brx.signal:brx.ink,fontWeight:700,textAlign:'right'}}>{h.verdict}</span>
              </div>);})}
          </div>)}
        </div>
      </div>
      <div style={{background:brx.ink,color:brx.bg,padding:'5px 14px',display:'flex',justifyContent:'space-between',font:`700 9.5px ${brx.mono}`,letterSpacing:'0.14em'}}>
        <span>NERVA · BLOCH SPHERE KERNEL · v10.0 · AMDG</span>
        <span>● LIVE · {metrics.verdict} · |r|={fmt(metrics.r,3)} · τ={fmt(metrics.tau,3)} · Tr(ρ²)={fmt(metrics.purity,4)}</span>
      </div>
    </div>
  );
}

const VIEWS={cockpit:CockpitView,bloomberg:BloombergView,phase:PhaseSpaceView,brutalist:BrutalistView,about:AboutView,api:ApiView};

// Mobile Phase Space view — clean single-column for small screens
function MobileView() {
  const {state,update,applyPreset,metrics,forecast,history,presets} = useNerva();
  const c = VC[metrics.verdict];
  const mono = "'JetBrains Mono',monospace", sans = "'IBM Plex Sans',sans-serif";
  const W=320,H=220;
  const x=state.E*W, y=(1-metrics.integrity)*H;
  const zones=[{n:'COMMIT',x0:0,y0:0,w:W,h:H*0.35,c:VC.COMMIT.fg},{n:'HOLD',x0:0,y0:H*0.35,w:W*0.5,h:H*0.30,c:VC.HOLD.fg},{n:'ESC',x0:W*0.5,y0:H*0.35,w:W*0.5,h:H*0.30,c:VC.ESCALATE.fg},{n:'ESC',x0:0,y0:H*0.65,w:W*0.5,h:H*0.35,c:VC.ESCALATE.fg},{n:'TOXIC',x0:W*0.5,y0:H*0.65,w:W*0.5,h:H*0.35,c:VC.TOXIC.fg}];

  const sliders = [
    {sym:'E',label:'Urgency',    val:state.E,  set:v=>update({E:v})},
    {sym:'S',label:'Strategy',   val:state.S,  set:v=>update({S:v})},
    {sym:'R',label:'Risk',       val:state.R,  set:v=>update({R:v})},
    {sym:'Sp',label:'Support',   val:state.Sp, set:v=>update({Sp:v})},
    {sym:'St',label:'Stability', val:state.St, set:v=>update({St:v})},
  ];

  return (
    <div style={{width:'100%',minHeight:'100%',background:'#0a0d12',color:'#d8dde6',fontFamily:sans,padding:'12px 14px',boxSizing:'border-box'}}>
      {/* Verdict hero */}
      <div style={{background:c.bg,border:`1.5px solid ${c.fg}`,borderRadius:6,padding:'12px 14px',marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{font:`700 28px/1 ${mono}`,color:c.fg,letterSpacing:'0.06em'}}>{metrics.verdict}</div>
            <div style={{font:`11px/1.4 ${sans}`,color:'#d8dde6',marginTop:4,maxWidth:220}}>{metrics.reason}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{font:`9px/1 ${mono}`,color:'rgba(216,221,230,0.4)',letterSpacing:'0.12em'}}>|r|</div>
            <div style={{font:`600 24px/1 ${mono}`,color:c.fg}}>{fmt(metrics.r,3)}</div>
            <div style={{font:`9px/1 ${mono}`,color:'rgba(216,221,230,0.4)',marginTop:3}}>τ {fmt(metrics.tau,3)}</div>
          </div>
        </div>
      </div>

      {/* Phase map */}
      <div style={{borderRadius:4,overflow:'hidden',marginBottom:12,position:'relative'}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',display:'block',background:'#070a0e'}}>
          {zones.map((z,i)=><g key={i}><rect x={z.x0} y={z.y0} width={z.w} height={z.h} fill={z.c} opacity={0.10}/><text x={z.x0+z.w/2} y={z.y0+z.h/2+4} textAnchor="middle" style={{font:`600 8px ${mono}`,fill:z.c,letterSpacing:'0.18em',opacity:0.6}}>{z.n}</text></g>)}
          {[0.25,0.5,0.75].map(t=><g key={t}><line x1={t*W} y1="0" x2={t*W} y2={H} stroke="rgba(255,255,255,0.05)" strokeDasharray="2 3"/><line x1="0" y1={t*H} x2={W} y2={t*H} stroke="rgba(255,255,255,0.05)" strokeDasharray="2 3"/></g>)}
          <line x1="0" y1={H*0.35} x2={W} y2={H*0.35} stroke="rgba(255,255,255,0.1)"/>
          <line x1="0" y1={H*0.65} x2={W} y2={H*0.65} stroke="rgba(255,255,255,0.1)"/>
          <line x1={W*0.5} y1={H*0.35} x2={W*0.5} y2={H} stroke="rgba(255,255,255,0.1)"/>
          <line x1="0" y1={(1-metrics.tau)*H} x2={W} y2={(1-metrics.tau)*H} stroke={c.fg} strokeDasharray="4 3" strokeWidth="1" opacity="0.5"/>
          {history.map((h,i)=><circle key={i} cx={h.E*W} cy={(1-h.integrity)*H} r="2.5" fill={VC[h.verdict]?.fg||'#888'} opacity={0.15+i*0.08}/>)}
          <ellipse cx={x} cy={y} rx={18} ry={13} fill={c.fg} opacity={0.10}/>
          <circle cx={x} cy={y} r={metrics.signal?7:6} fill={metrics.signal?c.fg:'none'} opacity={metrics.signal?1:0.4}/>
          <circle cx={x} cy={y} r="11" fill="none" stroke={c.fg} strokeWidth="1.2" opacity={metrics.signal?0.5:0.2}/>
          {!metrics.signal&&<circle cx={x} cy={y} r="5" fill={c.fg} opacity="0.3"/>}
        </svg>
        {!metrics.signal&&<div style={{position:'absolute',bottom:4,left:4,right:4,background:'rgba(0,0,0,0.75)',padding:'4px 8px',font:`9.5px ${mono}`,color:c.fg,borderRadius:3}}>⏸ SIGNAL BELOW τ</div>}
      </div>

      {/* Quick presets */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,marginBottom:12}}>

      {/* Sliders */}
      <div style={{background:'#0f1419',border:'1px solid rgba(255,255,255,0.06)',borderRadius:6,padding:'12px 14px',marginBottom:12}}>

          <div key={s.sym} style={{marginBottom:10}}>

              <span style={{font:`500 12px/1 ${sans}`}}><span style={{color:'#4cc9f0',font:`500 12px/1 ${mono}`,marginRight:6}}>{s.sym}</span>{s.label}</span>
              <span style={{font:`600 12px/1 ${mono}`,color:'#d8dde6'}}>{fmt(s.val,2)}</span>

          </div>
        ))}
      </div>

      {/* Key metrics */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
        {[['Integrity',metrics.integrity,'#3ddc97'],['Entropy',metrics.entropy,'#f5b942'],['EV',metrics.EV,metrics.EV>0?'#3ddc97':'#ff5c6c']].map(([l,v,col])=>(
          <div key={l} style={{background:'#0f1419',border:'1px solid rgba(255,255,255,0.06)',borderRadius:6,padding:'10px',textAlign:'center'}}>
            <div style={{font:`9px/1 ${mono}`,color:'rgba(216,221,230,0.4)',letterSpacing:'0.12em',marginBottom:4}}>{l.toUpperCase()}</div>

          </div>

      <div style={{background:'#0f1419',border:'1px solid rgba(255,255,255,0.06)',borderRadius:6,padding:'10px 12px',marginBottom:12}}>
        <div style={{font:`500 9px/1 ${mono}`,letterSpacing:'0.14em',color:'rgba(216,221,230,0.4)',marginBottom:6}}>FORECAST</div>
        <div style={{font:`11.5px/1.5 ${sans}`,color:c.fg}}>{forecast.window}</div>
      </div>

      {/* Plumb link */}
      <a href="/plumb.html" style={{display:'block',background:'rgba(61,220,151,0.08)',border:'1px solid rgba(61,220,151,0.3)',borderRadius:6,padding:'12px',textAlign:'center',textDecoration:'none',color:'#3ddc97',font:`600 11px/1 ${mono}`,letterSpacing:'0.14em'}}>
        PLUMB · BUYSIDE AUDIT ↗
      </a>
    </div>
  );
}

function App(){
  const[view,setView]=useState('cockpit');
  const[isMobile,setIsMobile]=useState(window.innerWidth<=768);

  useEffect(()=>{
    const check=()=>setIsMobile(window.innerWidth<=768);
    window.addEventListener('resize',check);
    return()=>window.removeEventListener('resize',check);
  },[]);

  useEffect(()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>{
      t.addEventListener('click',()=>{
        setView(t.dataset.view);
        document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
      });
    });
  },[]);

  if(isMobile){
    return <NervaProvider><MobileView/></NervaProvider>;
  }

  const View=VIEWS[view];
  if(view==='about')return <AboutView/>;
  if(view==='v11')return <div className="nerva-v11-root"><NervaV11Provider><NervaV11Cockpit/></NervaV11Provider></div>;
  return <NervaProvider><View/></NervaProvider>;
}

ReactDOM.createRoot(document.getElementById('view-root')).render(<App/>);
</script>
</body>
</html>
